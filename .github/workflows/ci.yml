name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-lint:
    name: Python lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run ty check app/ --exclude "**/vendor/**" --exclude "**/fl/**" --exclude "**/telemetry/**" --exclude "**/graphql/**" --exclude "**/tests/**"

  python-test:
    name: Python test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync
      - name: Build default frontend (for integration tests)
        run: |
          cd app/vendor && npm ci --silent && npm run build && cd "$GITHUB_WORKSPACE"
          cd plugins/frontends/default && npm ci --silent && npm run build
      - run: uv run --no-sync pytest

  js-lint:
    name: JS lint, format, typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci --silent
      - name: Install per-package deps
        run: |
          for pkg in app/vendor plugins/dashboards/*/package.json plugins/frontends/*/package.json; do
            dir=$([ -d "$pkg" ] && echo "$pkg" || dirname "$pkg")
            if [ -f "$dir/package.json" ]; then
              (cd "$dir" && npm ci --silent)
            fi
          done
      - name: TypeScript check
        run: |
          for pkg in app/vendor plugins/dashboards/*/package.json plugins/frontends/*/package.json; do
            dir=$([ -d "$pkg" ] && echo "$pkg" || dirname "$pkg")
            if [ -f "$dir/tsconfig.json" ]; then
              echo "Type checking $dir"
              (cd "$dir" && npx --no-install tsc --noEmit) || exit 1
            fi
          done
      - run: npm run lint
      - run: npm run format:check

  js-test:
    name: JS test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - app/vendor
          - plugins/dashboards/data-table
          - plugins/dashboards/event-gantt
          - plugins/dashboards/fitness-dashboard
          - plugins/frontends/default
          - plugins/frontends/focus
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ${{ matrix.package }}/package-lock.json
      - run: npm ci --silent
        working-directory: ${{ matrix.package }}
      - name: Install vendor deps (for shenas-frontends alias)
        if: startsWith(matrix.package, 'plugins/frontends/')
        run: npm ci --silent
        working-directory: app/vendor
      - run: npm test
        working-directory: ${{ matrix.package }}

  infra:
    name: Infra Validate
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: opentofu/setup-opentofu@v1
      - name: Validate
        working-directory: server/deploy/tofu
        run: |
          tofu init -backend=false
          tofu validate

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: [python-test, js-test]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync
      - name: Run Python tests with coverage
        id: coverage
        run: |
          make coverage
          TOTAL=$(python -c "import json; print(int(json.load(open('coverage.json'))['totals']['percent_covered']))")
          echo "total=$TOTAL" >> $GITHUB_OUTPUT
      - name: Update Python coverage badge
        if: vars.COVERAGE_GIST_ID != ''
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: ${{ vars.COVERAGE_GIST_ID }}
          filename: shenas-coverage.json
          label: coverage
          message: "${{ steps.coverage.outputs.total }}%"
          valColorRange: ${{ steps.coverage.outputs.total }}
          minColorRange: 50
          maxColorRange: 90
          namedLogo: pytest
      - name: Run JS tests with coverage
        id: js-coverage
        run: |
          npm ci --silent
          TOTAL_LINES=0
          COVERED_LINES=0
          for pkg in app/vendor plugins/dashboards/*/package.json plugins/frontends/*/package.json; do
            dir=$([ -d "$pkg" ] && echo "$pkg" || dirname "$pkg")
            if grep -q '"coverage"' "$dir/package.json" 2>/dev/null; then
              echo "Coverage for $dir"
              (cd "$dir" && npm ci --silent && npm run coverage -- --coverage.reporter=json-summary --coverage.reporter=text || true)
              SUMMARY="$dir/coverage/coverage-summary.json"
              if [ -f "$SUMMARY" ]; then
                LINES=$(python -c "import json; d=json.load(open('$SUMMARY'))['total']['lines']; print(d['total'])")
                COVERED=$(python -c "import json; d=json.load(open('$SUMMARY'))['total']['lines']; print(d['covered'])")
                TOTAL_LINES=$((TOTAL_LINES + LINES))
                COVERED_LINES=$((COVERED_LINES + COVERED))
              fi
            fi
          done
          if [ "$TOTAL_LINES" -gt 0 ]; then
            JS_TOTAL=$(python -c "print(int(($COVERED_LINES / $TOTAL_LINES) * 100))")
          else
            JS_TOTAL=0
          fi
          echo "total=$JS_TOTAL" >> $GITHUB_OUTPUT
      - name: Update JS coverage badge
        if: vars.JS_COVERAGE_GIST_ID != ''
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: ${{ vars.JS_COVERAGE_GIST_ID }}
          filename: shenas-js-coverage.json
          label: js coverage
          message: "${{ steps.js-coverage.outputs.total }}%"
          valColorRange: ${{ steps.js-coverage.outputs.total }}
          minColorRange: 50
          maxColorRange: 90
          namedLogo: vitest
