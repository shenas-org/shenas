name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: gcp-runners
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      - name: Install moon
        run: |
          sudo apt-get install -y -qq xz-utils >/dev/null 2>&1 || true
          curl -fsSL https://moonrepo.dev/install/moon.sh | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync
      - run: npm ci --silent
      - run: moon run :lint

  test:
    name: Test
    runs-on: gcp-runners
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      - name: Install moon
        run: |
          sudo apt-get install -y -qq xz-utils >/dev/null 2>&1 || true
          curl -fsSL https://moonrepo.dev/install/moon.sh | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync
      - name: Build default frontend (for integration tests)
        run: |
          cd app/vendor && npm ci --silent && npm run build && cd "$GITHUB_WORKSPACE"
          cd plugins/frontends/default && npm ci --silent && npm run build
      - run: moon run :test

  infra:
    name: Infra Validate
    runs-on: gcp-runners
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: opentofu/setup-opentofu@v1
      - name: Validate
        working-directory: server/deploy/tofu
        run: |
          tofu init -backend=false
          tofu validate

  coverage:
    name: Coverage
    runs-on: gcp-runners
    needs: [lint, test]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync
      - name: Build default frontend (for integration tests)
        run: |
          cd app/vendor && npm ci --silent && npm run build && cd "$GITHUB_WORKSPACE"
          cd plugins/frontends/default && npm ci --silent && npm run build
      - name: Run Python tests with coverage
        id: coverage
        run: |
          make coverage
          TOTAL=$(python -c "import json; print(int(json.load(open('coverage.json'))['totals']['percent_covered']))")
          echo "total=$TOTAL" >> $GITHUB_OUTPUT
      - name: Update Python coverage badge
        if: vars.COVERAGE_GIST_ID != ''
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: ${{ vars.COVERAGE_GIST_ID }}
          filename: shenas-coverage.json
          label: coverage
          message: "${{ steps.coverage.outputs.total }}%"
          valColorRange: ${{ steps.coverage.outputs.total }}
          minColorRange: 50
          maxColorRange: 90
          namedLogo: pytest
      - name: Run JS tests with coverage
        id: js-coverage
        run: |
          npm ci --silent
          TOTAL_LINES=0
          COVERED_LINES=0
          for pkg in app/vendor plugins/dashboards/*/package.json plugins/frontends/*/package.json; do
            dir=$([ -d "$pkg" ] && echo "$pkg" || dirname "$pkg")
            if grep -q '"coverage"' "$dir/package.json" 2>/dev/null; then
              echo "Coverage for $dir"
              (cd "$dir" && npm ci --silent && npm run coverage -- --coverage.reporter=json-summary --coverage.reporter=text || true)
              SUMMARY="$dir/coverage/coverage-summary.json"
              if [ -f "$SUMMARY" ]; then
                LINES=$(python -c "import json; d=json.load(open('$SUMMARY'))['total']['lines']; print(d['total'])")
                COVERED=$(python -c "import json; d=json.load(open('$SUMMARY'))['total']['lines']; print(d['covered'])")
                TOTAL_LINES=$((TOTAL_LINES + LINES))
                COVERED_LINES=$((COVERED_LINES + COVERED))
              fi
            fi
          done
          if [ "$TOTAL_LINES" -gt 0 ]; then
            JS_TOTAL=$(python -c "print(int(($COVERED_LINES / $TOTAL_LINES) * 100))")
          else
            JS_TOTAL=0
          fi
          echo "total=$JS_TOTAL" >> $GITHUB_OUTPUT
      - name: Update JS coverage badge
        if: vars.JS_COVERAGE_GIST_ID != ''
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: ${{ vars.JS_COVERAGE_GIST_ID }}
          filename: shenas-js-coverage.json
          label: js coverage
          message: "${{ steps.js-coverage.outputs.total }}%"
          valColorRange: ${{ steps.js-coverage.outputs.total }}
          minColorRange: 50
          maxColorRange: 90
          namedLogo: vitest
