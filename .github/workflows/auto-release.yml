name: Auto Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    name: Detect changes and tag releases
    runs-on: gcp-runners
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Detect changes and create tags
        run: |
          # Desktop is excluded -- use `make release-desktop` manually.
          PACKAGES=(
            "repo-server:server/repository/"
            "fl-server:server/fl/"
            "source-core:plugins/sources/core/"
            "source-garmin:plugins/sources/garmin/"
            "source-lunchmoney:plugins/sources/lunchmoney/"
            "source-obsidian:plugins/sources/obsidian/"
            "source-gmail:plugins/sources/gmail/"
            "source-gcalendar:plugins/sources/gcalendar/"
            "source-gtakeout:plugins/sources/gtakeout/"
            "source-duolingo:plugins/sources/duolingo/"
            "source-spotify:plugins/sources/spotify/"
            "schema-core:plugins/datasets/core/"
            "dataset-fitness:plugins/datasets/fitness/"
            "dataset-finance:plugins/datasets/finance/"
            "dataset-outcomes:plugins/datasets/outcomes/"
            "dataset-habits:plugins/datasets/habits/"
            "dashboard-fitness:plugins/dashboards/fitness/"
            "dashboard-data-table:plugins/dashboards/data-table/"
          )

          TAGS_CREATED=0

          for entry in "${PACKAGES[@]}"; do
            PREFIX="${entry%%:*}"
            DIRS="${entry#*:}"

            OUTPUT=$(bash scripts/bump-tag.sh "$PREFIX" $DIRS)
            [ -z "$OUTPUT" ] && continue

            eval "$OUTPUT"
            echo "::notice::Releasing $TAG ($BUMP bump from $PREV)"
            git tag "$TAG"
            TAGS_CREATED=$((TAGS_CREATED+1))
          done

          if [ "$TAGS_CREATED" -gt 0 ]; then
            echo "Pushing $TAGS_CREATED tag(s)"
            git push --tags
          else
            echo "No packages changed, nothing to release"
          fi
