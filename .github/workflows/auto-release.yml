name: Auto Release

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    name: Detect changes and tag releases
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: gcp-runners
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Detect changes and create tags
        run: |
          # Discover all releasable packages from pyproject.toml files.
          # Tag prefix is derived from the directory structure:
          #   plugins/<kind>/<name>/ -> <singular-kind>-<name>
          #   plugins/core/          -> plugin-core
          #   plugins/datasets/core/ -> dataset-core
          #   app/                   -> app
          #   shenasctl/             -> shenasctl
          #   scheduler/             -> scheduler
          #   server/repository/     -> repo-server
          #   server/fl/             -> fl-server

          declare -A PACKAGES

          # Top-level packages
          PACKAGES[app]="app/"
          PACKAGES[shenasctl]="shenasctl/"
          PACKAGES[scheduler]="scheduler/"

          # Server packages are deployed separately, not auto-released.

          # Plugin core (top-level)
          if [ -f "plugins/core/pyproject.toml" ]; then
            PACKAGES[plugin-core]="plugins/core/"
          fi

          # Plugin packages: plugins/<kind>/<name>/
          for kind_dir in plugins/*/; do
            kind=$(basename "$kind_dir")
            [ "$kind" = "core" ] && continue

            # Singular form of kind for tag prefix
            singular="${kind%s}"
            # Special case: transformations -> transformation
            [ "$kind" = "transformations" ] && singular="transformation"

            for pkg_dir in "$kind_dir"*/; do
              [ -f "$pkg_dir/pyproject.toml" ] || continue
              name=$(basename "$pkg_dir")

              PACKAGES[$singular-$name]="$pkg_dir"
            done
          done

          TAGS_CREATED=0

          for PREFIX in $(echo "${!PACKAGES[@]}" | tr ' ' '\n' | sort); do
            DIRS="${PACKAGES[$PREFIX]}"

            OUTPUT=$(bash scripts/bump-tag.sh "$PREFIX" $DIRS)
            [ -z "$OUTPUT" ] && continue

            eval "$OUTPUT"
            echo "::notice::Releasing $TAG ($BUMP bump from $PREV)"
            git tag "$TAG"
            TAGS_CREATED=$((TAGS_CREATED+1))
          done

          if [ "$TAGS_CREATED" -gt 0 ]; then
            echo "Pushing $TAGS_CREATED tag(s)"
            git push --tags
          else
            echo "No packages changed, nothing to release"
          fi
