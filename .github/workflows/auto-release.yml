name: Auto Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    name: Detect changes and tag releases
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Detect changes and create tags
        run: |
          # Desktop is excluded -- use `make release-desktop` manually.
          PACKAGES=(
            "repo-server:server/repository/"
            "fl-server:server/fl/"
            "pipe-core:plugins/pipes/core/"
            "pipe-garmin:plugins/pipes/garmin/"
            "pipe-lunchmoney:plugins/pipes/lunchmoney/"
            "pipe-obsidian:plugins/pipes/obsidian/"
            "pipe-gmail:plugins/pipes/gmail/"
            "pipe-gcalendar:plugins/pipes/gcalendar/"
            "pipe-gtakeout:plugins/pipes/gtakeout/"
            "pipe-duolingo:plugins/pipes/duolingo/"
            "pipe-spotify:plugins/pipes/spotify/"
            "schema-core:plugins/schemas/core/"
            "schema-fitness:plugins/schemas/fitness/"
            "schema-finance:plugins/schemas/finance/"
            "schema-outcomes:plugins/schemas/outcomes/"
            "schema-habits:plugins/schemas/habits/"
            "component-fitness-dashboard:plugins/components/fitness-dashboard/"
            "component-data-table:plugins/components/data-table/"
          )

          TAGS_CREATED=0

          for entry in "${PACKAGES[@]}"; do
            PREFIX="${entry%%:*}"
            DIRS="${entry#*:}"

            OUTPUT=$(bash scripts/bump-tag.sh "$PREFIX" $DIRS)
            [ -z "$OUTPUT" ] && continue

            eval "$OUTPUT"
            echo "::notice::Releasing $TAG ($BUMP bump from $PREV)"
            git tag "$TAG"
            TAGS_CREATED=$((TAGS_CREATED+1))
          done

          if [ "$TAGS_CREATED" -gt 0 ]; then
            echo "Pushing $TAGS_CREATED tag(s)"
            git push --tags
          else
            echo "No packages changed, nothing to release"
          fi
