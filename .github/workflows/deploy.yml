name: Deploy to GKE

on:
  push:
    tags:
      - 'fl-server/v*'
      - 'shenas-net/v*'
      - 'shenas-org/v*'
      - 'shenas-net-api/v*'
  workflow_dispatch:
    inputs:
      service:
        description: "Service to deploy"
        required: true
        type: choice
        options:
          - all
          - fl-server
          - shenas-net
          - shenas-org
          - shenas-net-api

env:
  PROJECT_ID: shenas-491609
  REGION: us-east4
  CLUSTER_NAME: shenas
  REGISTRY: us-east4-docker.pkg.dev/shenas-491609/shenas

jobs:
  deploy-fl-server:
    name: Deploy fl-server
    runs-on: gcp-runners
    timeout-minutes: 10
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/fl-server/v')) ||
      (github.event_name == 'workflow_dispatch' && (inputs.service == 'all' || inputs.service == 'fl-server'))
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.CLUSTER_NAME }}
          location: ${{ env.REGION }}

      - name: Resolve version tag
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/*/v* ]]; then
            TAG="${GITHUB_REF##*/}"
          else
            TAG="v0.0.0-dev"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Build, push, deploy
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          BUILD_ID=$(gcloud builds submit --async --format='value(id)' --config server/deploy/docker/cloudbuild.yaml \
                               --substitutions=_TAG="${REGISTRY}/fl-server:${TAG}",_TAG_LATEST="${REGISTRY}/fl-server:latest",_VERSION="${{ steps.version.outputs.version }}",_DOCKERFILE="server/deploy/docker/Dockerfile.fl-server" . 2>&1 | grep -oP '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}')
          echo "Waiting for Cloud Build $BUILD_ID..."
          while true; do
            STATUS=$(gcloud builds describe "$BUILD_ID" --format='value(status)' 2>/dev/null || echo "UNKNOWN")
            case "$STATUS" in
              SUCCESS) echo "Build succeeded"; break ;;
              FAILURE|TIMEOUT|CANCELLED) echo "Build failed: $STATUS"; exit 1 ;;
              *) sleep 10 ;;
            esac
          done
          kubectl apply -f server/deploy/k8s/namespace.yaml
          sed "s|REGION|${REGION}|g; s|PROJECT_ID|${PROJECT_ID}|g" server/deploy/k8s/fl-server.yaml | \
            sed "s|:latest|:${TAG}|g" | kubectl apply -f -
          kubectl rollout status deployment/fl-server -n shenas --timeout=120s

  deploy-shenas-net:
    name: Deploy shenas-net
    runs-on: gcp-runners
    timeout-minutes: 10
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/shenas-net/v')) ||
      (github.event_name == 'workflow_dispatch' && (inputs.service == 'all' || inputs.service == 'shenas-net'))
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.CLUSTER_NAME }}
          location: ${{ env.REGION }}

      - name: Resolve version tag
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/*/v* ]]; then
            TAG="${GITHUB_REF##*/}"
          else
            TAG="v0.0.0-dev"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Build, push, deploy
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          BUILD_ID=$(gcloud builds submit --async --format='value(id)' --config server/deploy/docker/cloudbuild.yaml \
                               --substitutions=_TAG="${REGISTRY}/shenas-net:${TAG}",_TAG_LATEST="${REGISTRY}/shenas-net:latest",_VERSION="0.0.0",_DOCKERFILE="server/deploy/docker/Dockerfile.shenas-net" . 2>&1 | grep -oP '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}')
          echo "Waiting for Cloud Build $BUILD_ID..."
          while true; do
            STATUS=$(gcloud builds describe "$BUILD_ID" --format='value(status)' 2>/dev/null || echo "UNKNOWN")
            case "$STATUS" in
              SUCCESS) echo "Build succeeded"; break ;;
              FAILURE|TIMEOUT|CANCELLED) echo "Build failed: $STATUS"; exit 1 ;;
              *) sleep 10 ;;
            esac
          done
          kubectl apply -f server/deploy/k8s/namespace.yaml
          sed "s|REGION|${REGION}|g; s|PROJECT_ID|${PROJECT_ID}|g" server/deploy/k8s/shenas-net.yaml | \
            sed "s|:latest|:${TAG}|g" | kubectl apply -f -
          kubectl rollout status deployment/shenas-net -n shenas --timeout=120s

  deploy-shenas-org:
    name: Deploy shenas-org
    runs-on: gcp-runners
    timeout-minutes: 10
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/shenas-org/v')) ||
      (github.event_name == 'workflow_dispatch' && (inputs.service == 'all' || inputs.service == 'shenas-org'))
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.CLUSTER_NAME }}
          location: ${{ env.REGION }}

      - name: Resolve version tag
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/*/v* ]]; then
            TAG="${GITHUB_REF##*/}"
          else
            TAG="v0.0.0-dev"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Build, push, deploy
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          BUILD_ID=$(gcloud builds submit --async --format='value(id)' --config server/deploy/docker/cloudbuild.yaml \
                               --substitutions=_TAG="${REGISTRY}/shenas-org:${TAG}",_TAG_LATEST="${REGISTRY}/shenas-org:latest",_VERSION="0.0.0",_DOCKERFILE="server/deploy/docker/Dockerfile.shenas-org" . 2>&1 | grep -oP '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}')
          echo "Waiting for Cloud Build $BUILD_ID..."
          while true; do
            STATUS=$(gcloud builds describe "$BUILD_ID" --format='value(status)' 2>/dev/null || echo "UNKNOWN")
            case "$STATUS" in
              SUCCESS) echo "Build succeeded"; break ;;
              FAILURE|TIMEOUT|CANCELLED) echo "Build failed: $STATUS"; exit 1 ;;
              *) sleep 10 ;;
            esac
          done
          kubectl apply -f server/deploy/k8s/namespace.yaml
          sed "s|REGION|${REGION}|g; s|PROJECT_ID|${PROJECT_ID}|g" server/deploy/k8s/shenas-org.yaml | \
            sed "s|:latest|:${TAG}|g" | kubectl apply -f -
          kubectl rollout status deployment/shenas-org -n shenas --timeout=120s

  deploy-shenas-net-api:
    name: Deploy shenas-net-api
    runs-on: gcp-runners
    timeout-minutes: 10
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/shenas-net-api/v')) ||
      (github.event_name == 'workflow_dispatch' && (inputs.service == 'all' || inputs.service == 'shenas-net-api'))
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.CLUSTER_NAME }}
          location: ${{ env.REGION }}

      - name: Resolve version tag
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/*/v* ]]; then
            TAG="${GITHUB_REF##*/}"
          else
            TAG="v0.0.0-dev"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Build, push, deploy
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          BUILD_ID=$(gcloud builds submit --async --format='value(id)' --config server/deploy/docker/cloudbuild.yaml \
                               --substitutions=_TAG="${REGISTRY}/shenas-net-api:${TAG}",_TAG_LATEST="${REGISTRY}/shenas-net-api:latest",_VERSION="${{ steps.version.outputs.version }}",_DOCKERFILE="server/deploy/docker/Dockerfile.shenas-net-api" . 2>&1 | grep -oP '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}')
          echo "Waiting for Cloud Build $BUILD_ID..."
          while true; do
            STATUS=$(gcloud builds describe "$BUILD_ID" --format='value(status)' 2>/dev/null || echo "UNKNOWN")
            case "$STATUS" in
              SUCCESS) echo "Build succeeded"; break ;;
              FAILURE|TIMEOUT|CANCELLED) echo "Build failed: $STATUS"; exit 1 ;;
              *) sleep 10 ;;
            esac
          done
          kubectl apply -f server/deploy/k8s/namespace.yaml
          sed "s|REGION|${REGION}|g; s|PROJECT_ID|${PROJECT_ID}|g" server/deploy/k8s/shenas-net-api.yaml | \
            sed "s|:latest|:${TAG}|g" | kubectl apply -f -
          kubectl rollout status deployment/shenas-net-api -n shenas --timeout=120s

  deploy-ingress:
    name: Apply ingress
    runs-on: gcp-runners
    timeout-minutes: 5
    needs: [deploy-fl-server, deploy-shenas-net, deploy-shenas-org, deploy-shenas-net-api]
    if: always() && (needs.deploy-fl-server.result == 'success' || needs.deploy-shenas-net.result == 'success' || needs.deploy-shenas-org.result == 'success' || needs.deploy-shenas-net-api.result == 'success')
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.CLUSTER_NAME }}
          location: ${{ env.REGION }}

      - name: Apply ingress
        run: |
          kubectl apply -f server/deploy/k8s/namespace.yaml
          kubectl apply -f server/deploy/k8s/ingress.yaml
