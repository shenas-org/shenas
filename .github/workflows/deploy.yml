name: Deploy to GKE

on:
  push:
    branches: [main]
    tags:
      - 'fl-server/v*'
      - 'shenas-net/v*'
      - 'web-api/v*'
  workflow_dispatch:
    inputs:
      service:
        description: "Service to deploy"
        required: true
        type: choice
        options:
          - all
          - fl-server
          - shenas-net
          - web-api

env:
  PROJECT_ID: shenas-491609
  REGION: us-east4
  CLUSTER_NAME: shenas
  REGISTRY: us-east4-docker.pkg.dev/shenas-491609/shenas

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      fl-server: ${{ steps.filter.outputs.fl-server }}
      shenas-net: ${{ steps.filter.outputs.shenas-net }}
      web-api: ${{ steps.filter.outputs.web-api }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            fl-server:
              - 'server/fl/**'
            shenas-net:
              - 'server/shenas.net/**'
            web-api:
              - 'server/api/**'

  deploy-fl-server:
    name: Deploy fl-server
    runs-on: ubuntu-latest
    needs: [changes]
    if: always() && (
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/fl-server/v')) ||
      (github.event_name == 'workflow_dispatch' && (inputs.service == 'all' || inputs.service == 'fl-server')) ||
      (needs.changes.result == 'success' && needs.changes.outputs.fl-server == 'true')
      )
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker auth
        run: gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet

      - uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.CLUSTER_NAME }}
          location: ${{ env.REGION }}

      - name: Resolve version tag
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/*/v* ]]; then
            TAG="${GITHUB_REF##*/}"
          else
            TAG="v0.0.0-dev"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Build, push, deploy
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          docker build --build-arg VERSION="${{ steps.version.outputs.version }}" -t "${REGISTRY}/fl-server:${TAG}" \
                       -t "${REGISTRY}/fl-server:latest" \
                       -f server/deploy/docker/Dockerfile.fl-server .
          docker push "${REGISTRY}/fl-server" --all-tags
          kubectl apply -f server/deploy/k8s/namespace.yaml
          sed "s|REGION|${REGION}|g; s|PROJECT_ID|${PROJECT_ID}|g" server/deploy/k8s/fl-server.yaml | \
            sed "s|:latest|:${TAG}|g" | kubectl apply -f -
          kubectl rollout status deployment/fl-server -n shenas --timeout=120s

  deploy-shenas-net:
    name: Deploy shenas-net
    runs-on: ubuntu-latest
    needs: [changes]
    if: always() && (
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/shenas-net/v')) ||
      (github.event_name == 'workflow_dispatch' && (inputs.service == 'all' || inputs.service == 'shenas-net')) ||
      (needs.changes.result == 'success' && needs.changes.outputs.shenas-net == 'true')
      )
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker auth
        run: gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet

      - uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.CLUSTER_NAME }}
          location: ${{ env.REGION }}

      - name: Resolve version tag
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/*/v* ]]; then
            TAG="${GITHUB_REF##*/}"
          else
            TAG="v0.0.0-dev"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Build, push, deploy
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          docker build -t "${REGISTRY}/shenas-net:${TAG}" \
                       -t "${REGISTRY}/shenas-net:latest" \
                       -f server/deploy/docker/Dockerfile.shenas-net .
          docker push "${REGISTRY}/shenas-net" --all-tags
          kubectl apply -f server/deploy/k8s/namespace.yaml
          sed "s|REGION|${REGION}|g; s|PROJECT_ID|${PROJECT_ID}|g" server/deploy/k8s/shenas-net.yaml | \
            sed "s|:latest|:${TAG}|g" | kubectl apply -f -
          kubectl rollout status deployment/shenas-net -n shenas --timeout=120s

  deploy-web-api:
    name: Deploy web-api
    runs-on: ubuntu-latest
    needs: [changes]
    if: always() && (
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/web-api/v')) ||
      (github.event_name == 'workflow_dispatch' && (inputs.service == 'all' || inputs.service == 'web-api')) ||
      (needs.changes.result == 'success' && needs.changes.outputs.web-api == 'true')
      )
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker auth
        run: gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet

      - uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.CLUSTER_NAME }}
          location: ${{ env.REGION }}

      - name: Resolve version tag
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/*/v* ]]; then
            TAG="${GITHUB_REF##*/}"
          else
            TAG="v0.0.0-dev"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Build, push, deploy
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          docker build --build-arg VERSION="${{ steps.version.outputs.version }}" -t "${REGISTRY}/web-api:${TAG}" \
                       -t "${REGISTRY}/web-api:latest" \
                       -f server/deploy/docker/Dockerfile.web-api .
          docker push "${REGISTRY}/web-api" --all-tags
          kubectl apply -f server/deploy/k8s/namespace.yaml
          sed "s|REGION|${REGION}|g; s|PROJECT_ID|${PROJECT_ID}|g" server/deploy/k8s/web-api.yaml | \
            sed "s|:latest|:${TAG}|g" | kubectl apply -f -
          kubectl rollout status deployment/web-api -n shenas --timeout=120s

  deploy-ingress:
    name: Apply ingress
    runs-on: ubuntu-latest
    needs: [deploy-fl-server, deploy-shenas-net, deploy-web-api]
    if: always() && (needs.deploy-fl-server.result == 'success' || needs.deploy-shenas-net.result == 'success' || needs.deploy-web-api.result == 'success')
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.CLUSTER_NAME }}
          location: ${{ env.REGION }}

      - name: Apply ingress
        run: |
          kubectl apply -f server/deploy/k8s/namespace.yaml
          kubectl apply -f server/deploy/k8s/ingress.yaml

