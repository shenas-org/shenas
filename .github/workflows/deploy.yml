name: Deploy to GKE

on:
  push:
    tags:
      - 'repo-server/v*'
      - 'fl-server/v*'
  workflow_dispatch:
    inputs:
      service:
        description: "Service to deploy"
        required: true
        type: choice
        options:
          - all
          - repo-server
          - fl-server

env:
  PROJECT_ID: shenas-491609
  REGION: us-east4
  CLUSTER_NAME: shenas
  REGISTRY: us-east4-docker.pkg.dev/shenas-491609/shenas

jobs:
  deploy-repo-server:
    name: Deploy repo-server
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/repo-server/v')) ||
      (github.event_name == 'workflow_dispatch' && (inputs.service == 'all' || inputs.service == 'repo-server'))
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker auth
        run: gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet

      - uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.CLUSTER_NAME }}
          location: ${{ env.REGION }}

      - name: Resolve version tag
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build, push, deploy
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          docker build --build-arg VERSION="${TAG##*/v}" -t "${REGISTRY}/repo-server:${TAG}" \
                       -t "${REGISTRY}/repo-server:latest" \
                       -f deploy/docker/Dockerfile.repo-server .
          docker push "${REGISTRY}/repo-server" --all-tags
          kubectl apply -f deploy/k8s/namespace.yaml
          sed "s|REGION|${REGION}|g; s|PROJECT_ID|${PROJECT_ID}|g" deploy/k8s/repo-server.yaml | \
            sed "s|:latest|:${TAG}|g" | kubectl apply -f -
          kubectl rollout status deployment/repo-server -n shenas --timeout=120s

  deploy-fl-server:
    name: Deploy fl-server
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/fl-server/v')) ||
      (github.event_name == 'workflow_dispatch' && (inputs.service == 'all' || inputs.service == 'fl-server'))
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker auth
        run: gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet

      - uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.CLUSTER_NAME }}
          location: ${{ env.REGION }}

      - name: Resolve version tag
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build, push, deploy
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          docker build --build-arg VERSION="${TAG##*/v}" -t "${REGISTRY}/fl-server:${TAG}" \
                       -t "${REGISTRY}/fl-server:latest" \
                       -f deploy/docker/Dockerfile.fl-server .
          docker push "${REGISTRY}/fl-server" --all-tags
          kubectl apply -f deploy/k8s/namespace.yaml
          sed "s|REGION|${REGION}|g; s|PROJECT_ID|${PROJECT_ID}|g" deploy/k8s/fl-server.yaml | \
            sed "s|:latest|:${TAG}|g" | kubectl apply -f -
          kubectl rollout status deployment/fl-server -n shenas --timeout=120s

  deploy-ingress:
    name: Apply ingress
    runs-on: ubuntu-latest
    needs: [deploy-repo-server, deploy-fl-server]
    if: always() && (needs.deploy-repo-server.result == 'success' || needs.deploy-fl-server.result == 'success')
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.CLUSTER_NAME }}
          location: ${{ env.REGION }}

      - name: Apply ingress
        run: |
          kubectl apply -f deploy/k8s/namespace.yaml
          kubectl apply -f deploy/k8s/ingress.yaml
