name: Deploy to GKE

on:
  push:
    branches: [main]
    paths:
      - 'repo-server/**'
      - 'fl-server/**'
      - 'deploy/**'
  workflow_dispatch:
    inputs:
      service:
        description: "Service to deploy (auto-deploy detects changes)"
        required: true
        type: choice
        options:
          - all
          - repo-server
          - fl-server

env:
  PROJECT_ID: shenas
  REGION: us-east4
  CLUSTER_NAME: shenas
  REPO_NAME: shenas
  REGISTRY: us-east4-docker.pkg.dev/shenas/shenas

jobs:
  detect:
    name: Detect changed services
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    outputs:
      repo-server: ${{ steps.changes.outputs.repo-server }}
      fl-server: ${{ steps.changes.outputs.fl-server }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            repo-server:
              - 'repo-server/**'
              - 'deploy/docker/Dockerfile.repo-server'
              - 'deploy/k8s/repo-server.yaml'
            fl-server:
              - 'fl-server/**'
              - 'deploy/docker/Dockerfile.fl-server'
              - 'deploy/k8s/fl-server.yaml'

  deploy-repo-server:
    name: Deploy repo-server
    runs-on: ubuntu-latest
    needs: [detect]
    if: |
      always() &&
      (github.event_name == 'workflow_dispatch' && (inputs.service == 'all' || inputs.service == 'repo-server')) ||
      (github.event_name == 'push' && needs.detect.outputs.repo-server == 'true')
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker auth
        run: gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.CLUSTER_NAME }}
          location: ${{ env.REGION }}

      - name: Build, push, deploy
        run: |
          docker build -t "${REGISTRY}/repo-server:${{ github.sha }}" \
                       -t "${REGISTRY}/repo-server:latest" \
                       -f deploy/docker/Dockerfile.repo-server .
          docker push "${REGISTRY}/repo-server" --all-tags
          kubectl apply -f deploy/k8s/namespace.yaml
          sed "s|REGION|${REGION}|g; s|PROJECT_ID|${PROJECT_ID}|g" deploy/k8s/repo-server.yaml | \
            sed "s|:latest|:${{ github.sha }}|g" | kubectl apply -f -
          kubectl rollout status deployment/repo-server -n shenas --timeout=120s

  deploy-fl-server:
    name: Deploy fl-server
    runs-on: ubuntu-latest
    needs: [detect]
    if: |
      always() &&
      (github.event_name == 'workflow_dispatch' && (inputs.service == 'all' || inputs.service == 'fl-server')) ||
      (github.event_name == 'push' && needs.detect.outputs.fl-server == 'true')
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker auth
        run: gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.CLUSTER_NAME }}
          location: ${{ env.REGION }}

      - name: Build, push, deploy
        run: |
          docker build -t "${REGISTRY}/fl-server:${{ github.sha }}" \
                       -t "${REGISTRY}/fl-server:latest" \
                       -f deploy/docker/Dockerfile.fl-server .
          docker push "${REGISTRY}/fl-server" --all-tags
          kubectl apply -f deploy/k8s/namespace.yaml
          sed "s|REGION|${REGION}|g; s|PROJECT_ID|${PROJECT_ID}|g" deploy/k8s/fl-server.yaml | \
            sed "s|:latest|:${{ github.sha }}|g" | kubectl apply -f -
          kubectl rollout status deployment/fl-server -n shenas --timeout=120s

  deploy-ingress:
    name: Apply ingress
    runs-on: ubuntu-latest
    needs: [deploy-repo-server, deploy-fl-server]
    if: always() && (needs.deploy-repo-server.result == 'success' || needs.deploy-fl-server.result == 'success')
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.CLUSTER_NAME }}
          location: ${{ env.REGION }}

      - name: Apply ingress
        run: |
          kubectl apply -f deploy/k8s/namespace.yaml
          kubectl apply -f deploy/k8s/ingress.yaml
