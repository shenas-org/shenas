name: Release Package

on:
  push:
    tags:
      - 'pipe-*/v*'
      - 'schema-*/v*'
      - 'component-*/v*'

permissions:
  contents: write

jobs:
  build:
    name: Build and sign wheel
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - run: uv sync

      - name: Parse tag
        id: parse
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG##*/v}"
          PREFIX="${TAG%/v*}"

          # Map tag prefix to directory
          SIGN=false
          case "$PREFIX" in
            pipe-*)      NAME="${PREFIX#pipe-}"; DIR="plugins/pipes/$NAME"; SIGN=true ;;
            schema-*)    NAME="${PREFIX#schema-}"; DIR="plugins/schemas/$NAME"; SIGN=true ;;
            component-*) NAME="${PREFIX#component-}"; DIR="plugins/components/$NAME"; SIGN=true ;;
            cli)         NAME="cli"; DIR="cli" ;;
            app)         NAME="app"; DIR="app" ;;
            repo-server)  NAME="repo-server"; DIR="repo-server" ;;
            *)           echo "Unknown tag prefix: $PREFIX"; exit 1 ;;
          esac

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "prefix=$PREFIX" >> "$GITHUB_OUTPUT"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "dir=$DIR" >> "$GITHUB_OUTPUT"
          echo "sign=$SIGN" >> "$GITHUB_OUTPUT"
          echo "Building $PREFIX v$VERSION from $DIR (sign=$SIGN)"

      - name: Build component frontend
        if: startsWith(steps.parse.outputs.prefix, 'component-')
        shell: bash
        run: |
          DIR="${{ steps.parse.outputs.dir }}"
          NAME="${{ steps.parse.outputs.name }}"
          PKG=$(echo "$NAME" | tr '-' '_')
          cd "$DIR" && npm install && npm run build && cd -
          cp "$DIR/$NAME.html" "$DIR/shenas_components/$PKG/static/$NAME.html"

      - name: Build wheel
        run: cd "${{ steps.parse.outputs.dir }}" && uv build --out-dir "$GITHUB_WORKSPACE/dist"
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION: ${{ steps.parse.outputs.version }}

      - name: Setup signing key
        if: steps.parse.outputs.sign == 'true'
        run: |
          mkdir -p .shenas
          echo "${{ secrets.SHENAS_SIGNING_KEY }}" | base64 -d > .shenas/shenas.key
          chmod 600 .shenas/shenas.key

      - name: Sign wheel
        if: steps.parse.outputs.sign == 'true'
        run: |
          python -c "
          import base64, sys
          from pathlib import Path
          from cryptography.hazmat.primitives.serialization import load_pem_private_key
          key = load_pem_private_key(Path('.shenas/shenas.key').read_bytes(), password=None)
          for whl in Path('dist').glob('*.whl'):
              sig = base64.b64encode(key.sign(whl.read_bytes())).decode()
              whl.with_suffix(whl.suffix + '.sig').write_text(sig)
              print(f'Signed {whl.name}')
          "

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "${{ steps.parse.outputs.prefix }} v${{ steps.parse.outputs.version }}"
          files: |
            dist/*.whl
            dist/*.whl.sig
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
