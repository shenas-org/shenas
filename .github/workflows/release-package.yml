name: Release Package

on:
  push:
    tags:
      - 'source-*/v*'
      - 'dataset-*/v*'
      - 'dashboard-*/v*'
      - 'plugin-core/v*'
      - 'frontend-*/v*'
      - 'theme-*/v*'
      - 'transformation-*/v*'
      - 'analysis-*/v*'
      - 'model-*/v*'

permissions:
  contents: read
  id-token: write

jobs:
  build:
    name: Build and sign wheel
    runs-on: gcp-runners
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/setup-node@v5
        with:
          node-version: "22"

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - run: uv sync

      - name: Parse tag
        id: parse
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG##*/v}"
          PREFIX="${TAG%/v*}"

          # Map tag prefix to directory
          SIGN=true
          case "$PREFIX" in
            source-*)         NAME="${PREFIX#source-}";         DIR="plugins/sources/$NAME" ;;
            dataset-*)        NAME="${PREFIX#dataset-}";        DIR="plugins/datasets/$NAME" ;;
            dashboard-*)      NAME="${PREFIX#dashboard-}";      DIR="plugins/dashboards/$NAME" ;;
            frontend-*)       NAME="${PREFIX#frontend-}";       DIR="plugins/frontends/$NAME" ;;
            theme-*)          NAME="${PREFIX#theme-}";          DIR="plugins/themes/$NAME" ;;
            transformation-*) NAME="${PREFIX#transformation-}"; DIR="plugins/transformations/$NAME" ;;
            analysis-*)       NAME="${PREFIX#analysis-}";       DIR="plugins/analyses/$NAME" ;;
            model-*)          NAME="${PREFIX#model-}";          DIR="plugins/models/$NAME" ;;
            plugin-core)      NAME="core";                     DIR="plugins/core" ;;
            *)                echo "Unknown tag prefix: $PREFIX"; exit 1 ;;
          esac

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "prefix=$PREFIX" >> "$GITHUB_OUTPUT"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "dir=$DIR" >> "$GITHUB_OUTPUT"
          echo "sign=$SIGN" >> "$GITHUB_OUTPUT"
          echo "Building $PREFIX v$VERSION from $DIR (sign=$SIGN)"

      - name: Build frontend assets
        if: startsWith(steps.parse.outputs.prefix, 'dashboard-') || startsWith(steps.parse.outputs.prefix, 'frontend-')
        shell: bash
        run: |
          DIR="${{ steps.parse.outputs.dir }}"
          if [ -f "$DIR/package.json" ]; then
            cd "$DIR" && npm install && npm run build
          fi

      - name: Build wheel
        run: cd "${{ steps.parse.outputs.dir }}" && uv build --out-dir "$GITHUB_WORKSPACE/dist"
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION: ${{ steps.parse.outputs.version }}

      - name: Setup signing key
        if: steps.parse.outputs.sign == 'true'
        run: |
          mkdir -p .shenas
          echo "${{ secrets.SHENAS_SIGNING_KEY }}" | base64 -d > .shenas/shenas.key
          chmod 600 .shenas/shenas.key

      - name: Sign wheel
        if: steps.parse.outputs.sign == 'true'
        run: |
          python -c "
          import base64, sys
          from pathlib import Path
          from cryptography.hazmat.primitives.serialization import load_pem_private_key
          key = load_pem_private_key(Path('.shenas/shenas.key').read_bytes(), password=None)
          for whl in Path('dist').glob('*.whl'):
              sig = base64.b64encode(key.sign(whl.read_bytes())).decode()
              whl.with_suffix(whl.suffix + '.sig').write_text(sig)
              print(f'Signed {whl.name}')
          "

      - name: Upload to GCS
        run: gsutil -m cp dist/*.whl dist/*.whl.sig gs://shenas-packages/
