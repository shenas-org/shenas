name: OSS Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'
      - 'source-*/v*'
      - 'dataset-*/v*'
      - 'schema-*/v*'
      - 'dashboard-*/v*'
      - 'plugin-core/v*'
      - 'transformation-*/v*'
      - 'frontend-*/v*'
      - 'theme-*/v*'

jobs:
  copybara:
    name: Sync to shenas-org/shenas
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release summary
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: bash scripts/oss-release-summary.sh /tmp/release_summary.txt

      - name: Configure SSH key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
          echo "${{ secrets.OSS_DEPLOY_KEY }}" > ~/.ssh/oss_deploy_key
          chmod 600 ~/.ssh/oss_deploy_key
          cat >> ~/.ssh/config <<'EOF'
          Host github.com-oss
            HostName github.com
            User git
            IdentityFile ~/.ssh/oss_deploy_key
          EOF

      - name: Configure Git
        run: |
          git config --global user.name "Alexander Funcke"
          git config --global user.email "funcke@shenas.net"

      - name: Prepare Copybara config
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SUMMARY=$(cat /tmp/release_summary.txt)

          sed -i "s|git@github.com:shenas-net/shenas.git|https://x-access-token:${GITHUB_TOKEN}@github.com/shenas-net/shenas.git|" .copybara/copy.bara.sky
          sed -i 's|git@github.com:shenas-org/shenas.git|git@github.com-oss:shenas-org/shenas.git|' .copybara/copy.bara.sky

          RELEASE_SUMMARY="$SUMMARY" python3 -c "
          import re, os
          summary = os.environ['RELEASE_SUMMARY']
          escaped = summary.replace('\\\\', '\\\\\\\\').replace('\"', '\\\\\"').replace('\n', '\\\\n')
          with open('.copybara/copy.bara.sky') as f:
              content = f.read()
          content = re.sub(
              r'metadata\.squash_notes\([^)]*\)',
              f'metadata.replace_message(\"{escaped}\")',
              content
          )
          with open('.copybara/copy.bara.sky', 'w') as f:
              f.write(content)
          "

          cp .copybara/copy.bara.sky copy.bara.sky

      - name: Run Copybara
        run: |
          docker run --rm \
            -v "$HOME/.ssh:/root/.ssh:ro" \
            -v "$GITHUB_WORKSPACE:/workspace" \
            -w /workspace \
            sharelatex/copybara:latest \
            copybara copy.bara.sky --work-dir /tmp/copybara
