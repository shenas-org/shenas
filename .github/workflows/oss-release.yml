name: OSS Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'
      - 'source-*/v*'
      - 'dataset-*/v*'
      - 'schema-*/v*'
      - 'dashboard-*/v*'
      - 'plugin-core/v*'
      - 'transformation-*/v*'
      - 'frontend-*/v*'
      - 'theme-*/v*'

jobs:
  copybara:
    name: Sync to shenas-org/shenas
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure SSH key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
          echo "${{ secrets.OSS_DEPLOY_KEY }}" > ~/.ssh/oss_deploy_key
          chmod 600 ~/.ssh/oss_deploy_key
          cat > ~/.ssh/config <<'EOF'
          Host github.com-oss
            HostName github.com
            User git
            IdentityFile /root/.ssh/oss_deploy_key
            StrictHostKeyChecking no
          EOF
          chmod 600 ~/.ssh/config

      - name: Configure Git
        run: |
          git config --global user.name "Alexander Funcke"
          git config --global user.email "funcke@shenas.net"

      - name: Prepare Copybara config
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          sed -i "s|git@github.com:shenas-net/shenas.git|https://x-access-token:${GITHUB_TOKEN}@github.com/shenas-net/shenas.git|" .copybara/copy.bara.sky
          sed -i 's|git@github.com:shenas-org/shenas.git|git@github.com-oss:shenas-org/shenas.git|' .copybara/copy.bara.sky
          cp .copybara/copy.bara.sky copy.bara.sky

      - name: Run Copybara
        run: |
          EXTRA_FLAGS=""
          if ! git ls-remote --heads git@github.com-oss:shenas-org/shenas.git main | grep -q main; then
            echo "Destination has no main branch, using --init-history --force"
            EXTRA_FLAGS="--init-history --force"
          fi

          docker run --rm \
            -v "$HOME/.ssh:/tmp/host-ssh:ro" \
            -v "$GITHUB_WORKSPACE:/workspace" \
            -w /workspace \
            sharelatex/copybara:latest \
            bash -c "
              cp -r /tmp/host-ssh /root/.ssh && \
              chmod 700 /root/.ssh && \
              chmod 600 /root/.ssh/config /root/.ssh/oss_deploy_key && \
              copybara copy.bara.sky --work-dir /tmp/copybara $EXTRA_FLAGS
            "

      - name: Generate LLM summary and amend commit
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python3 scripts/oss-release-summary.py /tmp/release_summary.txt

          git clone git@github.com-oss:shenas-org/shenas.git /tmp/oss-repo
          cd /tmp/oss-repo
          git config user.name "Alexander Funcke"
          git config user.email "funcke@shenas.net"

          SUMMARY=$(cat /tmp/release_summary.txt)
          git commit --amend -m "$SUMMARY" --no-edit 2>/dev/null || git commit --amend -m "$SUMMARY"
          git push --force-with-lease
