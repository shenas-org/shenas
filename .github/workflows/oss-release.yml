name: OSS Release

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  copybara:
    name: Sync to shenas-org/shenas
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure SSH key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
          echo "${{ secrets.OSS_DEPLOY_KEY }}" > ~/.ssh/oss_deploy_key
          chmod 600 ~/.ssh/oss_deploy_key
          cat > ~/.ssh/config <<'EOF'
          Host github.com-oss
            HostName github.com
            User git
            IdentityFile ~/.ssh/oss_deploy_key
            StrictHostKeyChecking no
          EOF
          chmod 600 ~/.ssh/config

      - name: Configure Git
        run: |
          git config --global user.name "shenas"
          git config --global user.email "noreply@shenas.net"

      - name: Prepare Copybara config
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          sed -i "s|git@github.com:shenas-net/shenas.git|https://x-access-token:${GITHUB_TOKEN}@github.com/shenas-net/shenas.git|" .copybara/copy.bara.sky
          sed -i 's|git@github.com:shenas-org/shenas.git|git@github.com-oss:shenas-org/shenas.git|' .copybara/copy.bara.sky
          cp .copybara/copy.bara.sky copy.bara.sky

      - name: Run Copybara
        run: |
          docker run --rm \
            --entrypoint bash \
            -v "$HOME/.ssh:/tmp/host-ssh:ro" \
            -v "$GITHUB_WORKSPACE:/workspace" \
            -w /workspace \
            -e COPYBARA_OPTIONS="--init-history --force --work-dir /tmp/copybara" \
            -e COPYBARA_CONFIG="copy.bara.sky" \
            sharelatex/copybara:latest \
            -c "cp -r /tmp/host-ssh /root/.ssh && chmod 700 /root/.ssh && chmod 600 /root/.ssh/config /root/.ssh/oss_deploy_key && sed -i 's|~/.ssh/|/root/.ssh/|g' /root/.ssh/config && git config --global user.name 'shenas' && git config --global user.email 'noreply@shenas.net' && mkdir -p /tmp/copybara && copybara"

      - name: Generate LLM summary and amend commit
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python3 scripts/oss-release-summary.py /tmp/release_summary.txt

          git clone git@github.com-oss:shenas-org/shenas.git /tmp/oss-repo
          cd /tmp/oss-repo
          git config user.name "shenas"
          git config user.email "noreply@shenas.net"

          SUMMARY=$(cat /tmp/release_summary.txt)
          git commit --amend -m "$SUMMARY" --no-edit 2>/dev/null || git commit --amend -m "$SUMMARY"
          git push --force-with-lease

      - name: Sync version tags to OSS repo
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OSS_HEAD=$(cd /tmp/oss-repo && git rev-parse HEAD)

          # Collect all version tags from the private repo, skip server-only prefixes.
          git tag -l 'app/v*' 'shenasctl/v*' 'scheduler/v*' \
                     'source-*/v*' 'dataset-*/v*' 'dashboard-*/v*' \
                     'plugin-core/v*' 'frontend-*/v*' 'theme-*/v*' \
                     'transformation-*/v*' 'analysis-*/v*' 'model-*/v*' | while read -r TAG; do
            # Check if the tag already exists on OSS
            if cd /tmp/oss-repo && git rev-parse "refs/tags/$TAG" >/dev/null 2>&1; then
              continue
            fi
            echo "Creating tag $TAG on shenas-org/shenas"
            cd /tmp/oss-repo && git tag "$TAG" "$OSS_HEAD"
          done

          cd /tmp/oss-repo && git push --tags 2>/dev/null || true
