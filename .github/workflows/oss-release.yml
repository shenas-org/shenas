name: OSS Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'
      - 'source-*/v*'
      - 'dataset-*/v*'
      - 'schema-*/v*'
      - 'dashboard-*/v*'
      - 'plugin-core/v*'
      - 'transformation-*/v*'
      - 'frontend-*/v*'
      - 'theme-*/v*'

jobs:
  copybara:
    name: Sync to shenas-org/shenas
    runs-on: gcp-runners
    container:
      image: sharelatex/copybara:latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.OSS_DEPLOY_KEY }}" > ~/.ssh/oss_deploy_key
          chmod 600 ~/.ssh/oss_deploy_key
          cat >> ~/.ssh/config <<EOF
          Host github.com-oss
            HostName github.com
            User git
            IdentityFile ~/.ssh/oss_deploy_key
            StrictHostKeyChecking no
          EOF

      - name: Configure Git
        run: |
          git config --global user.name "Alexander Funcke"
          git config --global user.email "funcke@shenas.net"

      - name: Run Copybara
        run: |
          sed -i 's|git@github.com:shenas-org/shenas.git|git@github.com-oss:shenas-org/shenas.git|' .copybara/copy.bara.sky
          copybara .copybara/copy.bara.sky
