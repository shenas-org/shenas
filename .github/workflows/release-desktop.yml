name: Release Desktop

on:
  push:
    tags:
      - 'desktop/v*'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
          - os: macos-latest
          - os: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: dtolnay/rust-toolchain@stable

      - uses: astral-sh/setup-uv@v5

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev

      - name: Sync desktop version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#desktop/v}"
          echo "$VERSION" > app/desktop/VERSION
          uv run python scripts/sync-desktop-version.py "$VERSION"

      - name: Install npm dependencies
        working-directory: app/desktop
        run: npm install

      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: app/desktop
          tagName: ${{ github.ref_name }}
          releaseName: "shenas desktop ${{ github.ref_name }}"
          releaseDraft: false
          prerelease: false
