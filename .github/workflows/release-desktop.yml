name: Release Desktop

on:
  push:
    tags:
      - 'desktop/v*'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            args: --bundles deb,rpm
          - os: macos-latest
            args: --bundles dmg
          - os: windows-latest
            args: --bundles msi

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/setup-node@v5
        with:
          node-version: "22"

      - uses: dtolnay/rust-toolchain@stable

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev

      - run: uv sync

      - name: Install local LLM runtime
        run: uv pip install 'shenas-app[local]'

      - name: Sync version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#desktop/v}"
          uv run python scripts/sync-desktop-version.py "$VERSION"

      - name: Build PyInstaller sidecars
        run: |
          uv run python build/pyinstaller_build.py --onefile
          mkdir -p app/desktop/src-tauri/binaries
          cp dist/pyinstaller/* app/desktop/src-tauri/binaries/

      - name: Install npm dependencies
        working-directory: app/desktop
        run: npm install

      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: app/desktop
          tagName: ${{ github.ref_name }}
          releaseName: "shenas ${{ github.ref_name }}"
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
