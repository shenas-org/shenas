name: Release Desktop

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            targets: deb rpm
          - os: macos-latest
            targets: dmg
          - os: windows-latest
            targets: msi nsis

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev

      - name: Install npm dependencies
        working-directory: app/desktop
        run: npm install

      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: app/desktop
          tagName: ${{ github.event.release.tag_name }}
          releaseName: "shenas ${{ github.event.release.tag_name }}"
          releaseBody: ${{ github.event.release.body }}
          releaseDraft: false
          prerelease: false
