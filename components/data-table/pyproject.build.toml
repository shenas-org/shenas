[project]
name = "shenas-component-data-table"
dynamic = ["version"]
description = "Data table with filtering, sorting, pagination, and column resizing"
requires-python = ">=3.11"
dependencies = []

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project.entry-points."shenas.components"]
data-table = "shenas_components.data_table:COMPONENT"

[tool.hatch.version]
path = "VERSION"
pattern = "(?P<version>.+)"

[tool.hatch.build.targets.wheel]
packages = ["shenas_components"]
