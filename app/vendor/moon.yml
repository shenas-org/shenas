$schema: 'https://moonrepo.dev/schemas/project.json'
id: 'vendor'

language: 'typescript'
stack: 'frontend'
tags: ['vendor']

workspace:
  inheritedTasks:
    exclude: ['test', 'build']

tasks:
  build:
    command: 'npm run build'
    inputs:
      - 'src/**/*'
      - 'package.json'
      - 'vite.config.js'
    deps:
      - '~:npm-install'
