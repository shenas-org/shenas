$schema: 'https://moonrepo.dev/schemas/project.json'

language: 'rust'
stack: 'frontend'
tags: ['mobile']

tasks:
  clean:
    script: 'rm -rf src-tauri/target/ src-tauri/gen/'
    options:
      cache: false
  build-android:
    command: 'npx tauri android build'
    inputs:
      - 'src-tauri/**/*'
      - 'src/**/*'
    outputs:
      - 'src-tauri/gen/android/app/build/'
  build-ios:
    command: 'npx tauri ios build'
    inputs:
      - 'src-tauri/**/*'
      - 'src/**/*'
  dev-android:
    command: 'npx tauri android dev'
  dev-ios:
    command: 'npx tauri ios dev'
