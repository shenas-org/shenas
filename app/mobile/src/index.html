<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>shenas</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg, #f5f5f5);
      color: var(--fg, #333);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .loading {
      text-align: center;
      opacity: 0.6;
    }
    .loading h1 { font-size: 1.5rem; font-weight: 400; }
  </style>
</head>
<body>
  <div class="loading">
    <h1>shenas</h1>
    <p>connecting to local server...</p>
  </div>
  <script>
    // Redirect to the Rust API server once it's up
    // In production, the Tauri app navigates directly via main.rs
    // This is a fallback for when the frontend is loaded before redirect
    async function waitForServer() {
      for (let i = 0; i < 30; i++) {
        try {
          const resp = await fetch('http://127.0.0.1:7280/api/health');
          if (resp.ok) {
            window.location.href = 'http://127.0.0.1:7280';
            return;
          }
        } catch {}
        await new Promise(r => setTimeout(r, 200));
      }
      document.querySelector('.loading p').textContent = 'Server failed to start';
    }
    waitForServer();
  </script>
</body>
</html>
