$schema: 'https://moonrepo.dev/schemas/project.json'

language: 'rust'
stack: 'frontend'
tags: ['desktop']

dependsOn:
  - 'app'

tasks:
  build:
    script: 'npx tauri build && makepkg -sf'
    inputs:
      - 'src-tauri/**/*'
      - 'src/**/*'
      - 'package.json'
      - 'PKGBUILD'
    outputs:
      - 'src-tauri/target/release/shenas-desktop'
      - 'src-tauri/target/release/bundle/'
