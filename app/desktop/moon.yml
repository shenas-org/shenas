$schema: 'https://moonrepo.dev/schemas/project.json'

language: 'rust'
stack: 'frontend'
tags: ['desktop']

dependsOn:
  - 'app'

tasks:
  clean:
    script: 'rm -rf src-tauri/target/ src-tauri/binaries/ pkg/ node_modules/'
    options:
      cache: false
  sync-version:
    script: 'python ../../scripts/sync-desktop-version.py'
    inputs:
      - '/scripts/sync-desktop-version.py'
  sidecars:
    script: >
      uv run python ../../build/pyinstaller_build.py --onefile &&
      mkdir -p src-tauri/binaries &&
      cp ../../dist/pyinstaller/* src-tauri/binaries/
    inputs:
      - '/build/**/*.py'
      - '/app/**/*.py'
      - '/shenasctl/**/*.py'
      - '/scheduler/**/*.py'
      - '/repository/**/*.py'
      - '/plugins/**/*.py'
    outputs:
      - 'src-tauri/binaries/'
  tauri:
    command: 'npx tauri build'
    inputs:
      - 'src-tauri/**/*'
      - 'src/**/*'
      - 'package.json'
    outputs:
      - 'src-tauri/target/release/shenas-desktop'
      - 'src-tauri/target/release/bundle/'
    deps:
      - '~:sync-version'
      - '~:sidecars'
  build:
    command: 'makepkg -sf'
    inputs:
      - 'PKGBUILD'
    deps:
      - '~:tauri'
