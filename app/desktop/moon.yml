$schema: 'https://moonrepo.dev/schemas/project.json'

language: 'rust'
stack: 'frontend'
tags: ['desktop']

dependsOn:
  - 'app'

tasks:
  tauri:
    command: 'npx tauri build'
    inputs:
      - 'src-tauri/**/*'
      - 'src/**/*'
      - 'package.json'
    outputs:
      - 'src-tauri/target/release/shenas-desktop'
      - 'src-tauri/target/release/bundle/'
  build:
    command: 'makepkg -sf'
    inputs:
      - 'PKGBUILD'
    deps:
      - '~:tauri'
