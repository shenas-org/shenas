<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>shenas</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        background: #f5f5f5;
        color: #333;
      }
      .loading {
        text-align: center;
      }
      .spinner {
        width: 40px;
        height: 40px;
        border: 3px solid #ddd;
        border-top-color: #0066cc;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin: 0 auto 16px;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div class="loading">
      <div class="spinner"></div>
      <p>Starting shenas server...</p>
    </div>
    <script>
      async function waitForServer() {
        const urls = [
          'http://127.0.0.1:7280',
          'http://localhost:7281',
        ];
        for (let i = 0; i < 150; i++) {
          for (const base of urls) {
            try {
              const resp = await fetch(base + '/api/health');
              if (resp.ok) {
                window.location.href = base;
                return;
              }
            } catch {}
          }
          await new Promise(r => setTimeout(r, 200));
        }
        document.querySelector('.loading p').textContent = 'Server failed to start.';
      }
      waitForServer();
    </script>
  </body>
</html>
