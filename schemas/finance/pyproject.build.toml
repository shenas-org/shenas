[project]
name = "shenas-schema-finance"
dynamic = ["version"]
description = "Canonical finance metrics schema for shenas"
requires-python = ">=3.11"
dependencies = [
    "shenas-schema-core",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project.entry-points."shenas.schemas"]
finance = "shenas_schemas.finance:SCHEMA"

[tool.hatch.version]
path = "VERSION"
pattern = "(?P<version>.+)"

[tool.hatch.build.targets.wheel]
packages = ["shenas_schemas"]
