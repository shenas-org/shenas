[project]
name = "shenas-schema-fitness"
dynamic = ["version"]
description = "Canonical fitness metrics schema for shenas"
requires-python = ">=3.11"
dependencies = [
    "shenas-schema-core",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project.entry-points."shenas.schemas"]
fitness = "shenas_schemas.fitness:SCHEMA"

[tool.hatch.version]
path = "VERSION"
pattern = "(?P<version>.+)"

[tool.hatch.build.targets.wheel]
packages = ["shenas_schemas"]
