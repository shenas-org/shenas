$schema: 'https://moonrepo.dev/schemas/workspace.json'

projects:
  - 'app'
  - 'app/desktop'
  - 'app/mobile'
  - 'repo-server'
  - 'plugins/sources/*'
  - 'plugins/datasets/*'
  - 'plugins/dashboards/*'
  - 'plugins/frontends/*'
  - 'app/vendor'

vcs:
  defaultBranch: 'main'

versionConstraint: '>=2.1.0'
