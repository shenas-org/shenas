$schema: 'https://moonrepo.dev/schemas/tasks.json'

inheritedBy:
  language: 'python'

implicitInputs:
  - '/pyproject.toml'
  - '/uv.lock'

tasks:
  clean:
    script: 'find $MOON_PROJECT_SOURCE -type d -name __pycache__ -exec rm -rf {} + 2>/dev/null; rm -rf $MOON_PROJECT_SOURCE/dist/ $MOON_PROJECT_SOURCE/*.egg-info'
    options:
      runFromWorkspaceRoot: true
      cache: false
  lint:
    script: 'uv run --no-sync ruff check $MOON_PROJECT_SOURCE/'
    inputs:
      - '**/*.py'
      - 'pyproject.toml'
    options:
      runFromWorkspaceRoot: true
  test:
    script: 'uv run --no-sync pytest $MOON_PROJECT_SOURCE/tests/ -q'
    inputs:
      - '**/*.py'
    deps:
      - '~:lint'
    options:
      runFromWorkspaceRoot: true
  build:
    script: |
      cd $MOON_PROJECT_SOURCE && uv build --out-dir $MOON_WORKSPACE_ROOT/packages/
      cd $MOON_WORKSPACE_ROOT
      if [ -f .shenas/shenas.key ]; then
        pkg=$(echo $MOON_PROJECT_SOURCE | sed 's|.*/||; s|-|_|g')
        for whl in packages/shenas_*${pkg}-*.whl; do
          [ -f "$whl.sig" ] || uv run --no-sync shenasrepoctl sign "$whl"
        done
      fi
    inputs:
      - '**/*.py'
      - 'pyproject.toml'
    deps:
      - '~:test'
    options:
      runFromWorkspaceRoot: true
