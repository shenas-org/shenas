$schema: 'https://moonrepo.dev/schemas/tasks.json'

inheritedBy:
  language: 'python'

implicitInputs:
  - '/pyproject.toml'
  - '/uv.lock'

tasks:
  clean:
    script: 'find $MOON_PROJECT_SOURCE -type d -name __pycache__ -exec rm -rf {} + 2>/dev/null; rm -rf $MOON_PROJECT_SOURCE/dist/ $MOON_PROJECT_SOURCE/*.egg-info'
    options:
      runFromWorkspaceRoot: true
      cache: false
  python-lint:
    script: 'uv run --no-sync ruff check $MOON_PROJECT_SOURCE/'
    inputs:
      - '**/*.py'
      - 'pyproject.toml'
    options:
      runFromWorkspaceRoot: true
  python-format-check:
    script: 'uv run --no-sync ruff format --check $MOON_PROJECT_SOURCE/'
    inputs:
      - '**/*.py'
      - 'pyproject.toml'
    options:
      runFromWorkspaceRoot: true
  python-type-check:
    script: 'uv run --no-sync ty check $MOON_PROJECT_SOURCE/ --exclude "**/vendor/**" --exclude "**/fl/**"'
    inputs:
      - '**/*.py'
    options:
      runFromWorkspaceRoot: true
  python-test:
    script: 'if [ -d $MOON_PROJECT_SOURCE/tests/ ]; then uv run --no-sync pytest $MOON_PROJECT_SOURCE/tests/ -q; else echo "No tests directory, skipping"; fi'
    inputs:
      - '**/*.py'
    options:
      runFromWorkspaceRoot: true
  lint:
    script: 'echo "All lint checks passed."'
    deps:
      - '~:python-lint'
      - '~:python-format-check'
      - '~:python-type-check'
  test:
    script: 'echo "All tests passed."'
    deps:
      - '~:python-test'
  build:
    script: |
      cd $MOON_PROJECT_SOURCE && uv build --out-dir $MOON_WORKSPACE_ROOT/packages/
      cd $MOON_WORKSPACE_ROOT
    inputs:
      - '**/*.py'
      - 'pyproject.toml'
    deps:
      - '~:python-test'
    options:
      runFromWorkspaceRoot: true
