$schema: 'https://moonrepo.dev/schemas/tasks.json'

inheritedBy:
  language: 'python'

implicitInputs:
  - '/pyproject.toml'
  - '/uv.lock'

tasks:
  lint:
    script: 'uv run --no-sync ruff check $MOON_PROJECT_SOURCE/'
    inputs:
      - '**/*.py'
      - 'pyproject.toml'
    options:
      runFromWorkspaceRoot: true
  test:
    script: 'uv run --no-sync pytest $MOON_PROJECT_SOURCE/tests/ -q'
    inputs:
      - '**/*.py'
    deps:
      - '~:lint'
    options:
      runFromWorkspaceRoot: true
  build:
    script: |
      cd $MOON_PROJECT_SOURCE && uv build --out-dir $MOON_WORKSPACE_ROOT/packages/
      pkg=$(echo $MOON_PROJECT_SOURCE | sed 's|.*/||; s|-|_|g')
      for whl in $MOON_WORKSPACE_ROOT/packages/shenas_*${pkg}-*.whl; do
        [ -f "$whl.sig" ] || uv run --no-sync shenasrepoctl sign "$whl" || true
      done
    inputs:
      - '**/*.py'
      - 'pyproject.toml'
    outputs:
      - '/packages/*.whl'
    deps:
      - '~:test'
    options:
      runFromWorkspaceRoot: true
