$schema: 'https://moonrepo.dev/schemas/tasks.json'

inheritedBy:
  language: 'typescript'

fileGroups:
  sources:
    - 'src/**/*'
  configs:
    - 'package.json'

tasks:
  npm-install:
    script: 'cd $MOON_PROJECT_SOURCE && npm ci --silent'
    inputs:
      - 'package.json'
      - 'package-lock.json'
    options:
      runFromWorkspaceRoot: true
      cache: false
  clean:
    script: 'rm -rf $MOON_PROJECT_SOURCE/node_modules/ $MOON_PROJECT_SOURCE/dist/'
    options:
      runFromWorkspaceRoot: true
      cache: false
  js-lint:
    script: 'cd $MOON_PROJECT_SOURCE && npx eslint "src/**/*.ts"'
    inputs:
      - '@group(sources)'
    deps:
      - '~:npm-install'
    options:
      runFromWorkspaceRoot: true
  js-format-check:
    script: 'cd $MOON_PROJECT_SOURCE && npx prettier --check "src/**/*.ts"'
    inputs:
      - '@group(sources)'
    deps:
      - '~:npm-install'
    options:
      runFromWorkspaceRoot: true
  js-type-check:
    script: 'if [ -f $MOON_PROJECT_SOURCE/tsconfig.json ]; then npx tsc --noEmit -p $MOON_PROJECT_SOURCE/tsconfig.json; else echo "No tsconfig.json, skipping"; fi'
    inputs:
      - '@group(sources)'
      - 'tsconfig.json'
    deps:
      - '~:npm-install'
    options:
      runFromWorkspaceRoot: true
  js-test:
    command: 'npm test'
    inputs:
      - '@group(sources)'
      - '@group(configs)'
    deps:
      - '~:npm-install'
  lint:
    script: 'echo "All lint checks passed."'
    deps:
      - '~:js-lint'
      - '~:js-format-check'
      - '~:js-type-check'
  test:
    script: 'echo "All tests passed."'
    deps:
      - '~:js-test'
  build:
    script: |
      cd $MOON_PROJECT_SOURCE
      npm run build
      name=$(basename $MOON_PROJECT_SOURCE)
      pkg=$(echo $name | tr '-' '_')
      uv build --out-dir $MOON_WORKSPACE_ROOT/packages/
      cd $MOON_WORKSPACE_ROOT
    inputs:
      - '@group(sources)'
      - '@group(configs)'
      - '**/*.py'
      - 'pyproject.toml'
    deps:
      - '~:npm-install'
      - '~:js-test'
    options:
      runFromWorkspaceRoot: true
