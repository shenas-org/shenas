[project]
name = "shenas-component-dashboard"
dynamic = ["version"]
description = "Canonical metrics dashboard for shenas"
requires-python = ">=3.11"
dependencies = []

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project.entry-points."shenas.components"]
dashboard = "shenas_components.dashboard:COMPONENT"

[tool.hatch.version]
path = "VERSION"
pattern = "(?P<version>.+)"

[tool.hatch.build.targets.wheel]
packages = ["shenas_components"]
