    "ty==0.0.27",
    "pyinstaller>=6.19.0",
]
fl = [
    "flwr>=1.15",
    "torch>=2.0",
    "shenas-model-sleep-forecast",
]

[tool.pytest.ini_options]
addopts = "--import-mode=importlib"
pythonpath = [".", "server/repository"]
filterwarnings = [
    "ignore::DeprecationWarning:opentelemetry.*",
    "ignore::DeprecationWarning:ibis.*",
    "ignore:coroutine.*was never awaited:RuntimeWarning",
]

[tool.ruff]
line-length = 127
extend-exclude = ["app/desktop/src-tauri/target"]

[tool.ruff.lint]
select = ["ALL"]
ignore = [
    "D",       # pydocstyle -- no docstring enforcement
    "ANN",     # flake8-annotations -- uses ty for type checking
    "ERA",     # eradicate -- commented-out code detection (too noisy)
    "FIX",     # fixme comments
    "TD",      # todo comments
    "S",       # bandit security -- too opinionated for a local-first app
    "INP001",  # implicit namespace package (workspace members)
    "COM812",  # missing trailing comma (conflicts with ruff formatter)
    "ISC001",  # implicit string concat (conflicts with ruff formatter)
    "T20",     # flake8-print -- print() used intentionally (CLI app)
    "PLC0415", # import not at top level -- lazy imports used intentionally
    "BLE001",  # blind exception -- broad except used in plugin discovery
    "FBT",     # boolean trap -- too strict for CLI/API params
    "EM",      # exception message style -- too verbose for small project
    "TRY003",  # long exception messages -- same as EM
    "B008",    # function call in default arg -- typer.Option() pattern
    "PLW0603", # global statement -- used for singleton DB connection
    "SLF001",  # private member access -- needed for plugin introspection
    "N806",    # variable in function should be lowercase -- dataclass ClassVar pattern
    "PLR2004", # magic value in comparison -- acceptable in small project
    "TRY300",  # try-except-return -- acceptable pattern
    "PTH123",  # open() vs Path.open() -- not worth changing
    "NPY002",  # numpy random -- legacy pattern in FL code
    "C901",    # too complex -- refactor later
    "PLR0913", # too many arguments -- CLI/API functions
    "PLW1510", # subprocess.run without check -- intentional
    "B904",    # raise without from -- fix incrementally
]
fixable = ["ALL"]
unfixable = []

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = ["S101", "PLR2004", "ARG"]
"**/tests/**/*.py" = ["S101", "PLR2004", "ARG"]
"build/**/*.py" = ["SLF001"]
"scripts/**/*.py" = ["T20"]

[tool.ruff.lint.isort]
known-first-party = ["app", "shenas_plugins", "shenas_sources", "shenas_datasets", "shenas_dashboards", "shenas_themes", "shenas_frontends", "repository", "scheduler"]

[tool.ty.analysis]
# Optional dependencies that may not be installed in every environment.
# Using replace-imports-with-any so ty treats them as Any when absent
# rather than erroring, while still type-checking them when present.
replace-imports-with-any = [
    "anthropic",
    "authlib.**",
    "flwr.**",
    "google.cloud.**",
    "itsdangerous",
    "llama_cpp",
    "opentelemetry.instrumentation.**",
    "psycopg.**",
    "shenas_models.**",
    "shenasctl.**",
    "torch.**",
]

[tool.commitizen]
version_provider = "uv"
