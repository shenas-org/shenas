[project]
name = "shenas"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "cryptography>=46.0.6",
    "dlt[duckdb]>=1.24.0",
    "fastapi>=0.135.2",
    "keyring>=25.7.0",
    "pyarrow>=23.0.1",
    "rich>=14.3.3",
    "typer>=0.24.1",
    "uvicorn>=0.42.0",
]

[dependency-groups]
dev = [
    "commitizen>=4.13.9",
    "httpx>=0.28.1",
    "pytest>=9.0.2",
    "pytest-cov>=7.1.0",
    "ruff>=0.15.8",
    "ty>=0.0.26",
]

[project.scripts]
shenas = "cli.main:main"

[tool.uv]
package = true

[tool.uv.workspace]
members = []

[tool.setuptools.packages.find]
include = ["cli*", "local_frontend*", "repository*"]

[tool.pytest.ini_options]
testpaths = ["tests", "pipes/core/tests", "pipes/garmin/tests", "pipes/lunchmoney/tests", "schemas/fitness_tracker/tests", "schemas/finance/tests"]
addopts = "--import-mode=importlib"

[tool.ruff]
line-length = 127

[tool.commitizen]
version_provider = "uv"
