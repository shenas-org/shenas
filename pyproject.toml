[project]
name = "shenas-workspace"
version = "0.0.0"
description = "Shenas metrics platform workspace"
requires-python = ">=3.11"

[tool.uv]
package = false

[tool.uv.workspace]
members = ["cli", "app", "repository", "pipes/core", "schemas/core"]

[tool.uv.sources]
shenas-cli = { workspace = true }
shenas-app = { workspace = true }
shenas-repository = { workspace = true }
shenas-pipe-core = { workspace = true }
shenas-schema-core = { workspace = true }

[dependency-groups]
dev = [
    "shenas-cli",
    "commitizen>=4.13.9",
    "httpx>=0.28.1",
    "pytest>=9.0.2",
    "pytest-cov>=7.1.0",
    "ruff>=0.15.8",
    "ty>=0.0.26",
]

[tool.pytest.ini_options]
testpaths = ["cli/tests", "app/tests", "repository/tests", "pipes/core/tests", "pipes/garmin/tests", "pipes/gmail/tests", "pipes/lunchmoney/tests", "pipes/obsidian/tests", "schemas/fitness/tests", "schemas/finance/tests", "schemas/outcomes/tests"]
addopts = "--import-mode=importlib"
pythonpath = ["."]

[tool.ruff]
line-length = 127

[tool.commitizen]
version_provider = "uv"
