[project]
name = "shenas-workspace"
version = "0.0.0"
description = "Local-first quantified-self platform"
requires-python = ">=3.11"
dependencies = [
    "strawberry-graphql[fastapi]>=0.312.3",
]

[tool.uv]
package = false
# Flower pins typer<0.21 and rich<14 for its CLI. We only use
# flwr.client and flwr.common at runtime, which work with newer versions.
override-dependencies = ["typer>=0.24.1", "rich>=14.3.3"]

[tool.uv.workspace]
members = [
    "app",
    "shenasctl",
    "server/repository",
    "plugins/sources/*",
    "plugins/datasets/*",
    "plugins/dashboards/*",
    "plugins/models/*",
    "plugins/transformers/*",
    "plugins/analyses/*",
    "plugins/frontends/*",
    "plugins/themes/*",
]

[tool.uv.sources]
