[project]
name = "shenas-schema-events"
dynamic = ["version"]
description = "Canonical event metrics for shenas"
requires-python = ">=3.11"
dependencies = [
    "shenas-schema-core",
    "shenas-plugin-core",
]

[build-system]
requires = ["hatchling", "hatch-vcs"]
build-backend = "hatchling.build"

[project.entry-points."shenas.schemas"]
events = "shenas_schemas.events:EventsSchema"

[tool.hatch.version]
source = "vcs"
tag-pattern = "schema-events/v(?P<version>[^+]+)"
raw-options.root = "../../.."
raw-options.git_describe_command = ["git", "describe", "--dirty", "--tags", "--long", "--match", "schema-events/v*"]

[tool.hatch.build.targets.wheel]
packages = ["shenas_schemas"]
