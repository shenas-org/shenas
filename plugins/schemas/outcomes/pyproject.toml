[project]
name = "shenas-schema-outcomes"
dynamic = ["version"]
description = "Canonical daily outcomes schema for shenas"
requires-python = ">=3.11"
dependencies = [
    "shenas-schema-core",
]

[build-system]
requires = ["hatchling", "hatch-vcs"]
build-backend = "hatchling.build"

[project.entry-points."shenas.schemas"]
outcomes = "shenas_schemas.outcomes:SCHEMA"

[tool.hatch.version]
source = "vcs"
tag-pattern = "schema-outcomes/v(?P<version>[^+]+)"
raw-options.root = "../../.."
raw-options.git_describe_command = ["git", "describe", "--dirty", "--tags", "--long", "--match", "schema-outcomes/v*"]

[tool.hatch.build.targets.wheel]
packages = ["shenas_schemas"]
