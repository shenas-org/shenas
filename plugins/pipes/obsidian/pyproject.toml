[project]
name = "shenas-pipe-obsidian"
dynamic = ["version"]
description = "Obsidian daily notes dlt connector for shenas"
requires-python = ">=3.11"
dependencies = [
    "dlt[duckdb]>=1.24.0",
    "pyyaml>=6.0.0",
    "shenas-pipe-core",
    "shenas-schema-outcomes",
]

[build-system]
requires = ["hatchling", "hatch-vcs"]
build-backend = "hatchling.build"

[project.entry-points."shenas.pipes"]
obsidian = "shenas_pipes.obsidian.pipe:ObsidianPipe"

[tool.hatch.version]
source = "vcs"
tag-pattern = "pipe-obsidian/v(?P<version>[^+]+)"
raw-options.root = "../../.."
raw-options.git_describe_command = ["git", "describe", "--dirty", "--tags", "--long", "--match", "pipe-obsidian/v*"]

[tool.hatch.build.targets.wheel]
packages = ["shenas_pipes"]
