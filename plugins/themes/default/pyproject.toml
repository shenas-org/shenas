[project]
name = "shenas-theme-default"
dynamic = ["version"]
description = "Default shenas theme"
requires-python = ">=3.11"
dependencies = [
    "shenas-plugin-core",
]

[build-system]
requires = ["hatchling", "hatch-vcs"]
build-backend = "hatchling.build"

[project.entry-points."shenas.themes"]
default = "shenas_themes.default:DefaultTheme"

[tool.hatch.version]
source = "vcs"
tag-pattern = "theme-default/v(?P<version>[^+]+)"
raw-options.root = "../../.."
raw-options.git_describe_command = ["git", "describe", "--dirty", "--tags", "--long", "--match", "theme-default/v*"]

[tool.hatch.build.targets.wheel]
packages = ["shenas_themes"]
