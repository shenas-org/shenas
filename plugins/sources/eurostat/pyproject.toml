[project]
name = "shenas-source-eurostat"
dynamic = ["version"]
description = "Eurostat Urban Audit city-level demographics and economics for shenas"
requires-python = ">=3.11"
dependencies = [
    "dlt[duckdb]>=1.24.0",
    "httpx>=0.28.0",
    "shenas-source-core",
]

[build-system]
requires = ["hatchling", "hatch-vcs"]
build-backend = "hatchling.build"

[project.entry-points."shenas.sources"]
eurostat = "shenas_sources.eurostat.source:EurostatSource"

[tool.hatch.version]
source = "vcs"
tag-pattern = "source-eurostat/v(?P<version>[^+]+)"
raw-options.root = "../../.."
raw-options.git_describe_command = ["git", "describe", "--dirty", "--tags", "--long", "--match", "source-eurostat/v*"]

[tool.hatch.build.targets.wheel]
packages = ["shenas_sources"]
