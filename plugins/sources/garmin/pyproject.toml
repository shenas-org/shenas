[project]
name = "shenas-source-garmin"
dynamic = ["version"]
description = "Garmin Connect dlt connector for shenas"
requires-python = ">=3.11"
dependencies = [
    "dlt[duckdb]>=1.24.0",
    "garminconnect>=0.2.40",
    "pendulum>=3.0.0",
    "shenas-source-core",
    "shenas-dataset-events",
    "shenas-dataset-fitness",
]

[build-system]
requires = ["hatchling", "hatch-vcs"]
build-backend = "hatchling.build"

[project.entry-points."shenas.sources"]
garmin = "shenas_sources.garmin.source:GarminSource"

[tool.hatch.version]
source = "vcs"
tag-pattern = "source-garmin/v(?P<version>[^+]+)"
raw-options.root = "../../.."
raw-options.git_describe_command = ["git", "describe", "--dirty", "--tags", "--long", "--match", "source-garmin/v*"]

[tool.hatch.build.targets.wheel]
packages = ["shenas_sources"]
