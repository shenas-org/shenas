[project]
name = "shenas-source-freedomhouse"
dynamic = ["version"]
description = "Freedom House Freedom in the World scores for shenas"
requires-python = ">=3.11"
dependencies = [
    "dlt[duckdb]>=1.24.0",
    "httpx>=0.28.0",
    "openpyxl>=3.1.0",
    "shenas-source-core",
]

[build-system]
requires = ["hatchling", "hatch-vcs"]
build-backend = "hatchling.build"

[project.entry-points."shenas.sources"]
freedomhouse = "shenas_sources.freedomhouse.source:FreedomHouseSource"

[tool.hatch.version]
source = "vcs"
tag-pattern = "source-freedomhouse/v(?P<version>[^+]+)"
raw-options.root = "../../.."
raw-options.git_describe_command = ["git", "describe", "--dirty", "--tags", "--long", "--match", "source-freedomhouse/v*"]

[tool.hatch.build.targets.wheel]
packages = ["shenas_sources"]
