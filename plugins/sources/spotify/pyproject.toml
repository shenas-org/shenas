[project]
name = "shenas-source-spotify"
dynamic = ["version"]
description = "Spotify dlt connector for shenas"
requires-python = ">=3.11"
dependencies = [
    "dlt[duckdb]>=1.24.0",
    "spotipy>=2.24.0",
    "shenas-source-core",
    "shenas-dataset-events",
]

[build-system]
requires = ["hatchling", "hatch-vcs"]
build-backend = "hatchling.build"

[project.entry-points."shenas.sources"]
spotify = "shenas_sources.spotify.pipe:SpotifyPipe"

[tool.hatch.version]
source = "vcs"
tag-pattern = "source-spotify/v(?P<version>[^+]+)"
raw-options.root = "../../.."
raw-options.git_describe_command = ["git", "describe", "--dirty", "--tags", "--long", "--match", "source-spotify/v*"]

[tool.hatch.build.targets.wheel]
packages = ["shenas_sources"]
