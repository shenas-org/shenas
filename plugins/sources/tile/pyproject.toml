[project]
name = "shenas-source-tile"
dynamic = ["version"]
description = "Tile Bluetooth tracker dlt connector for shenas"
requires-python = ">=3.11"
dependencies = [
    "dlt[duckdb]>=1.24.0",
    "httpx>=0.28.0",
    "shenas-source-core",
]

[build-system]
requires = ["hatchling", "hatch-vcs"]
build-backend = "hatchling.build"

[project.entry-points."shenas.sources"]
tile = "shenas_sources.tile.source:TileSource"

[tool.hatch.version]
source = "vcs"
tag-pattern = "source-tile/v(?P<version>[^+]+)"
raw-options.root = "../../.."
raw-options.git_describe_command = ["git", "describe", "--dirty", "--tags", "--long", "--match", "source-tile/v*"]

[tool.hatch.build.targets.wheel]
packages = ["shenas_sources"]
