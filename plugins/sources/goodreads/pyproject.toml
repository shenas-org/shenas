[project]
name = "shenas-source-goodreads"
dynamic = ["version"]
description = "Goodreads public shelf scraper for shenas"
requires-python = ">=3.11"
dependencies = [
    "dlt[duckdb]>=1.24.0",
    "httpx>=0.28.0",
    "feedparser>=6.0.0",
    "shenas-source-core",
    "shenas-dataset-events",
]

[build-system]
requires = ["hatchling", "hatch-vcs"]
build-backend = "hatchling.build"

[project.entry-points."shenas.sources"]
goodreads = "shenas_sources.goodreads.source:GoodreadsSource"

[tool.hatch.version]
source = "vcs"
tag-pattern = "source-goodreads/v(?P<version>[^+]+)"
raw-options.root = "../../.."
raw-options.git_describe_command = ["git", "describe", "--dirty", "--tags", "--long", "--match", "source-goodreads/v*"]

[tool.hatch.build.targets.wheel]
packages = ["shenas_sources"]
