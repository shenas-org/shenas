[project]
name = "shenas-source-who"
dynamic = ["version"]
description = "WHO Global Health Observatory indicators for shenas"
requires-python = ">=3.11"
dependencies = [
    "dlt[duckdb]>=1.24.0",
    "httpx>=0.28.0",
    "shenas-source-core",
]

[build-system]
requires = ["hatchling", "hatch-vcs"]
build-backend = "hatchling.build"

[project.entry-points."shenas.sources"]
who = "shenas_sources.who.source:WHOSource"

[tool.hatch.version]
source = "vcs"
tag-pattern = "source-who/v(?P<version>[^+]+)"
raw-options.root = "../../.."
raw-options.git_describe_command = ["git", "describe", "--dirty", "--tags", "--long", "--match", "source-who/v*"]

[tool.hatch.build.targets.wheel]
packages = ["shenas_sources"]
