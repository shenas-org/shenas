[project]
name = "shenas-source-github"
dynamic = ["version"]
description = "GitHub activity and repository data dlt connector for shenas"
requires-python = ">=3.11"
dependencies = [
    "dlt[duckdb]>=1.24.0",
    "httpx>=0.28.0",
    "shenas-source-core",
]

[build-system]
requires = ["hatchling", "hatch-vcs"]
build-backend = "hatchling.build"

[project.entry-points."shenas.sources"]
github = "shenas_sources.github.source:GithubSource"

[tool.hatch.version]
source = "vcs"
tag-pattern = "source-github/v(?P<version>[^+]+)"
raw-options.root = "../../.."
raw-options.git_describe_command = ["git", "describe", "--dirty", "--tags", "--long", "--match", "source-github/v*"]

[tool.hatch.build.targets.wheel]
packages = ["shenas_sources"]
