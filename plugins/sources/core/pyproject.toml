[project]
name = "shenas-source-core"
dynamic = ["version"]
description = "Shared utilities for shenas pipes"
requires-python = ">=3.11"
dependencies = [
    "opentelemetry-api>=1.25.0",
    "shenas-app",
    "shenas-dataset-core",
]

[project.optional-dependencies]
google = [
    "google-api-python-client>=2.0.0",
    "google-auth-oauthlib>=1.0.0",
]
cli = [
    "rich>=14.0.0",
    "typer>=0.24.0",
]

[build-system]
requires = ["hatchling", "hatch-vcs"]
build-backend = "hatchling.build"

[tool.hatch.version]
source = "vcs"
tag-pattern = "source-core/v(?P<version>[^+]+)"
raw-options.root = "../../.."
raw-options.git_describe_command = ["git", "describe", "--dirty", "--tags", "--long", "--match", "source-core/v*"]

[tool.hatch.build.targets.wheel]
packages = ["shenas_sources"]
