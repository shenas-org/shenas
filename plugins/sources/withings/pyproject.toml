[project]
name = "shenas-source-withings"
dynamic = ["version"]
description = "Withings health devices dlt connector for shenas"
requires-python = ">=3.11"
dependencies = [
    "dlt[duckdb]>=1.24.0",
    "httpx>=0.28.0",
    "pendulum>=3.0.0",
    "shenas-source-core",
    "shenas-dataset-fitness",
]

[build-system]
requires = ["hatchling", "hatch-vcs"]
build-backend = "hatchling.build"

[project.entry-points."shenas.sources"]
withings = "shenas_sources.withings.source:WithingsSource"

[tool.hatch.version]
source = "vcs"
tag-pattern = "source-withings/v(?P<version>[^+]+)"
raw-options.root = "../../.."
raw-options.git_describe_command = ["git", "describe", "--dirty", "--tags", "--long", "--match", "source-withings/v*"]

[tool.hatch.build.targets.wheel]
packages = ["shenas_sources"]
