[project]
name = "shenas-transformation-sql"
dynamic = ["version"]
description = "SQL transformer plugin for shenas"
requires-python = ">=3.11"
dependencies = [
    "shenas-transformation-core",
]

[build-system]
requires = ["hatchling", "hatch-vcs"]
build-backend = "hatchling.build"

[project.entry-points."shenas.transformers"]
sql = "shenas_transformations.sql:SqlTransformer"

[tool.hatch.version]
source = "vcs"
tag-pattern = "transformation-sql/v(?P<version>[^+]+)"
raw-options.root = "../../.."
raw-options.git_describe_command = ["git", "describe", "--dirty", "--tags", "--long", "--match", "transformation-sql/v*"]

[tool.hatch.build.targets.wheel]
packages = ["shenas_transformations"]
