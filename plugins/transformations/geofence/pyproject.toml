[project]
name = "shenas-transformation-geofence"
dynamic = ["version"]
description = "Geofence transformation plugin for shenas"
requires-python = ">=3.11"
dependencies = [
    "shenas-transformation-core",
]

[build-system]
requires = ["hatchling", "hatch-vcs"]
build-backend = "hatchling.build"

[project.entry-points."shenas.transformations"]
geofence = "shenas_transformations.geofence:GeofenceTransformation"

[project.entry-points."shenas.graphql"]
geofence = "shenas_transformations.geofence.graphql"

[project.entry-points."shenas.cli"]
geofence = "shenas_transformations.geofence.cli:app"

[tool.hatch.version]
source = "vcs"
tag-pattern = "transformation-geofence/v(?P<version>[^+]+)"
raw-options.root = "../../.."
raw-options.git_describe_command = ["git", "describe", "--dirty", "--tags", "--long", "--match", "transformation-geofence/v*"]

[tool.hatch.build.targets.wheel]
packages = ["shenas_transformations"]
