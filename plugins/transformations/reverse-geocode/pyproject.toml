[project]
name = "shenas-transformation-reverse-geocode"
dynamic = ["version"]
description = "Reverse geocode transformation plugin for shenas"
requires-python = ">=3.11"
dependencies = [
    "shenas-transformation-core",
    "geopy>=2.4.0",
]

[build-system]
requires = ["hatchling", "hatch-vcs"]
build-backend = "hatchling.build"

[project.entry-points."shenas.transformations"]
reverse-geocode = "shenas_transformations.reverse_geocode:ReverseGeocodeTransformation"

[tool.hatch.version]
source = "vcs"
tag-pattern = "transformation-reverse-geocode/v(?P<version>[^+]+)"
raw-options.root = "../../.."
raw-options.git_describe_command = ["git", "describe", "--dirty", "--tags", "--long", "--match", "transformation-reverse-geocode/v*"]

[tool.hatch.build.targets.wheel]
packages = ["shenas_transformations"]
