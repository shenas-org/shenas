[project]
name = "shenas-transformation-regex-extract"
dynamic = ["version"]
description = "Regex extract transformation plugin for shenas"
requires-python = ">=3.11"
dependencies = [
    "shenas-transformation-core",
]

[build-system]
requires = ["hatchling", "hatch-vcs"]
build-backend = "hatchling.build"

[project.entry-points."shenas.transformations"]
regex-extract = "shenas_transformations.regex_extract:RegexExtractTransformation"

[tool.hatch.version]
source = "vcs"
tag-pattern = "transformation-regex-extract/v(?P<version>[^+]+)"
raw-options.root = "../../.."
raw-options.git_describe_command = ["git", "describe", "--dirty", "--tags", "--long", "--match", "transformation-regex-extract/v*"]

[tool.hatch.build.targets.wheel]
packages = ["shenas_transformations"]
