[project]
name = "shenas-dashboard-event-gantt"
dynamic = ["version"]
description = "Event timeline Gantt chart visualization for shenas"
requires-python = ">=3.11"
dependencies = [
    "shenas-dashboard-core",
    "shenas-dataset-events",
]

[build-system]
requires = ["hatchling", "hatch-vcs"]
build-backend = "hatchling.build"

[project.entry-points."shenas.dashboards"]
event-gantt = "shenas_dashboards.event_gantt:EventGanttComponent"

[tool.hatch.version]
source = "vcs"
tag-pattern = "dashboard-event-gantt/v(?P<version>[^+]+)"
raw-options.root = "../../.."
raw-options.git_describe_command = ["git", "describe", "--dirty", "--tags", "--long", "--match", "dashboard-event-gantt/v*"]

[tool.hatch.build.targets.wheel]
packages = ["shenas_dashboards"]
