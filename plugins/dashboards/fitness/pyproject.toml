[project]
name = "shenas-dashboard-fitness"
dynamic = ["version"]
description = "Canonical fitness metrics dashboard for shenas"
requires-python = ">=3.11"
dependencies = [
    "shenas-dashboard-core",
    "shenas-dataset-fitness",
]

[build-system]
requires = ["hatchling", "hatch-vcs"]
build-backend = "hatchling.build"

[project.entry-points."shenas.dashboards"]
fitness = "shenas_dashboards.fitness_dashboard:FitnessDashboardComponent"

[tool.hatch.version]
source = "vcs"
tag-pattern = "dashboard-fitness/v(?P<version>[^+]+)"
raw-options.root = "../../.."
raw-options.git_describe_command = ["git", "describe", "--dirty", "--tags", "--long", "--match", "dashboard-fitness/v*"]

[tool.hatch.build.targets.wheel]
packages = ["shenas_dashboards"]
