[project]
name = "shenas-dashboard-timeline"
dynamic = ["version"]
description = "Unified timeline dashboard showing events and daily metrics from all sources"
requires-python = ">=3.11"
dependencies = [
    "shenas-dashboard-core",
    "shenas-dataset-events",
    "shenas-dataset-fitness",
    "shenas-dataset-finance",
    "shenas-dataset-outcomes",
    "shenas-dataset-habits",
]

[build-system]
requires = ["hatchling", "hatch-vcs"]
build-backend = "hatchling.build"

[project.entry-points."shenas.dashboards"]
timeline = "shenas_dashboards.timeline:TimelineComponent"

[tool.hatch.version]
source = "vcs"
tag-pattern = "dashboard-timeline/v(?P<version>[^+]+)"
raw-options.root = "../../.."
raw-options.git_describe_command = ["git", "describe", "--dirty", "--tags", "--long", "--match", "dashboard-timeline/v*"]

[tool.hatch.build.targets.wheel]
packages = ["shenas_dashboards"]
