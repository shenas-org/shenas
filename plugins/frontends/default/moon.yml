$schema: 'https://moonrepo.dev/schemas/project.json'
id: 'frontend-default'

language: 'typescript'
stack: 'frontend'
tags: ['plugin', 'ui']

dependsOn:
  - 'vendor'

workspace:
  inheritedTasks:
    exclude: ['build']

tasks:
  js-test:
    deps:
      - 'vendor:npm-install'
  build:
    command: 'npm run build'
    deps:
      - '~:npm-install'
      - 'vendor:build'
