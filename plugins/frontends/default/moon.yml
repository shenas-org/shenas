$schema: 'https://moonrepo.dev/schemas/project.json'
id: 'frontend-default'

language: 'typescript'
stack: 'frontend'
tags: ['plugin', 'ui']

dependsOn:
  - 'vendor'

tasks:
  js-test:
    deps:
      - 'vendor:npm-install'
  build:
    script: 'cd $MOON_PROJECT_SOURCE && npm run build'
    deps:
      - '~:npm-install'
      - 'vendor:build'
    options:
      runFromWorkspaceRoot: true
      mergeDeps: replace
