[project]
name = "shenas-dataset-finance"
dynamic = ["version"]
description = "Canonical finance metrics schema for shenas"
requires-python = ">=3.11"
dependencies = [
    "shenas-dataset-core",
]

[build-system]
requires = ["hatchling", "hatch-vcs"]
build-backend = "hatchling.build"

[project.entry-points."shenas.datasets"]
finance = "shenas_datasets.finance:FinanceSchema"

[tool.hatch.version]
source = "vcs"
tag-pattern = "dataset-finance/v(?P<version>[^+]+)"
raw-options.root = "../../.."
raw-options.git_describe_command = ["git", "describe", "--dirty", "--tags", "--long", "--match", "dataset-finance/v*"]

[tool.hatch.build.targets.wheel]
packages = ["shenas_datasets"]
