[project]
name = "shenas-dataset-location"
dynamic = ["version"]
description = "Canonical location metrics for shenas"
requires-python = ">=3.11"
dependencies = [
    "shenas-dataset-core",
    "shenas-app",
]

[build-system]
requires = ["hatchling", "hatch-vcs"]
build-backend = "hatchling.build"

[project.entry-points."shenas.datasets"]
location = "shenas_datasets.location:LocationSchema"

[tool.hatch.version]
source = "vcs"
tag-pattern = "dataset-location/v(?P<version>[^+]+)"
raw-options.root = "../../.."
raw-options.git_describe_command = ["git", "describe", "--dirty", "--tags", "--long", "--match", "dataset-location/v*"]

[tool.hatch.build.targets.wheel]
packages = ["shenas_datasets"]
