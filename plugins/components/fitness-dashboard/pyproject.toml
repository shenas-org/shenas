[project]
name = "shenas-component-fitness-dashboard"
dynamic = ["version"]
description = "Canonical fitness metrics dashboard for shenas"
requires-python = ">=3.11"
dependencies = [
    "shenas-component-core",
    "shenas-schema-fitness",
]

[build-system]
requires = ["hatchling", "hatch-vcs"]
build-backend = "hatchling.build"

[project.entry-points."shenas.components"]
fitness-dashboard = "shenas_components.fitness_dashboard:COMPONENT"

[tool.hatch.version]
source = "vcs"
tag-pattern = "component-fitness-dashboard/v(?P<version>[^+]+)"
raw-options.root = "../../.."
raw-options.git_describe_command = ["git", "describe", "--dirty", "--tags", "--long", "--match", "component-fitness-dashboard/v*"]

[tool.hatch.build.targets.wheel]
packages = ["shenas_components"]
