[project]
name = "shenas-component-data-table"
dynamic = ["version"]
description = "Data table with filtering, sorting, pagination, and column resizing"
requires-python = ">=3.11"
dependencies = [
    "shenas-component-core",
]

[build-system]
requires = ["hatchling", "hatch-vcs"]
build-backend = "hatchling.build"

[project.entry-points."shenas.components"]
data-table = "shenas_components.data_table:DataTableComponent"

[tool.hatch.version]
source = "vcs"
tag-pattern = "component-data-table/v(?P<version>[^+]+)"
raw-options.root = "../../.."
raw-options.git_describe_command = ["git", "describe", "--dirty", "--tags", "--long", "--match", "component-data-table/v*"]

[tool.hatch.build.targets.wheel]
packages = ["shenas_components"]
