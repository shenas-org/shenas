[project]
name = "shenas-transformer-geofence"
dynamic = ["version"]
description = "Geofence transformer plugin for shenas"
requires-python = ">=3.11"
dependencies = [
    "shenas-transformer-core",
]

[build-system]
requires = ["hatchling", "hatch-vcs"]
build-backend = "hatchling.build"

[project.entry-points."shenas.transformers"]
geofence = "shenas_transformers.geofence:GeofenceTransformer"

[project.entry-points."shenas.graphql"]
geofence = "shenas_transformers.geofence.graphql"

[project.entry-points."shenas.cli"]
geofence = "shenas_transformers.geofence.cli:app"

[tool.hatch.version]
source = "vcs"
tag-pattern = "transformer-geofence/v(?P<version>[^+]+)"
raw-options.root = "../../.."
raw-options.git_describe_command = ["git", "describe", "--dirty", "--tags", "--long", "--match", "transformer-geofence/v*"]

[tool.hatch.build.targets.wheel]
packages = ["shenas_transformers"]
