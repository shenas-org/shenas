[project]
name = "shenas-transformer-core"
dynamic = ["version"]
description = "Shared transformer plugin utilities for shenas"
requires-python = ">=3.11"
dependencies = [
    "shenas-plugin-core",
]

[build-system]
requires = ["hatchling", "hatch-vcs"]
build-backend = "hatchling.build"

[tool.hatch.version]
source = "vcs"
tag-pattern = "transformer-core/v(?P<version>[^+]+)"
raw-options.root = "../../.."
raw-options.git_describe_command = ["git", "describe", "--dirty", "--tags", "--long", "--match", "transformer-core/v*"]

[tool.hatch.build.targets.wheel]
packages = ["shenas_transformers"]
