[project]
name = "shenas-transformation-dedup-merge"
dynamic = ["version"]
description = "Dedup/merge transformer plugin for shenas"
requires-python = ">=3.11"
dependencies = [
    "shenas-transformation-core",
]

[build-system]
requires = ["hatchling", "hatch-vcs"]
build-backend = "hatchling.build"

[project.entry-points."shenas.transformers"]
dedup-merge = "shenas_transformers.dedup_merge:DedupMergeTransformer"

[tool.hatch.version]
source = "vcs"
tag-pattern = "transformation-dedup-merge/v(?P<version>[^+]+)"
raw-options.root = "../../.."
raw-options.git_describe_command = ["git", "describe", "--dirty", "--tags", "--long", "--match", "transformation-dedup-merge/v*"]

[tool.hatch.build.targets.wheel]
packages = ["shenas_transformers"]
