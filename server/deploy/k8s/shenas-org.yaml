apiVersion: apps/v1
kind: Deployment
metadata:
  name: shenas-org
  namespace: shenas
  labels:
    app: shenas-org
spec:
  replicas: 1
  selector:
    matchLabels:
      app: shenas-org
  template:
    metadata:
      labels:
        app: shenas-org
    spec:
      containers:
        - name: shenas-org
          image: REGION-docker.pkg.dev/PROJECT_ID/shenas/shenas-org:latest
          ports:
            - containerPort: 80
              name: http
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: shenas-org
  namespace: shenas
spec:
  selector:
    app: shenas-org
  ports:
    - port: 80
      targetPort: 80
      name: http
  type: ClusterIP
