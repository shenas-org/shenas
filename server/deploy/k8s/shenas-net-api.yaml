apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: shenas
  labels:
    app: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      serviceAccountName: shenas-net-api
      containers:
        - name: api
          image: REGION-docker.pkg.dev/PROJECT_ID/shenas/shenas-net-api:latest
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: GCS_PACKAGES_BUCKET
              value: shenas-packages
          envFrom:
            - secretRef:
                name: shenas-net-api-secrets
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: shenas
  annotations:
    cloud.google.com/neg: '{"exposed_ports": {"80": {"name": "api-neg"}}}'
spec:
  selector:
    app: api
  ports:
    - port: 80
      targetPort: 8000
      name: http
  type: ClusterIP
