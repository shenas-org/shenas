apiVersion: apps/v1
kind: Deployment
metadata:
  name: fl-server
  namespace: shenas
  labels:
    app: fl-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fl-server
  template:
    metadata:
      labels:
        app: fl-server
    spec:
      containers:
        - name: fl-server
          image: REGION-docker.pkg.dev/PROJECT_ID/shenas/fl-server:latest
          ports:
            - containerPort: 8080
              name: grpc
            - containerPort: 8081
              name: http
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: weights
              mountPath: /app/.shenas-fl
          readinessProbe:
            httpGet:
              path: /api/fl/health
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/fl/health
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 30
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
      volumes:
        - name: weights
          persistentVolumeClaim:
            claimName: fl-weights
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: fl-weights
  namespace: shenas
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 256Mi
  storageClassName: standard-rwo
---
apiVersion: cloud.google.com/v1
kind: BackendConfig
metadata:
  name: fl-grpc-health
  namespace: shenas
spec:
  healthCheck:
    type: HTTP
    port: 8081
    requestPath: /api/fl/health
---
apiVersion: v1
kind: Service
metadata:
  name: fl-server-grpc
  namespace: shenas
  annotations:
    cloud.google.com/backend-config: '{"default": "fl-grpc-health"}'
    cloud.google.com/neg: '{"exposed_ports": {"8080": {"name": "fl-grpc-neg"}}}'
spec:
  selector:
    app: fl-server
  ports:
    - port: 8080
      targetPort: 8080
      name: grpc
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: fl-server-api
  namespace: shenas
  annotations:
    cloud.google.com/neg: '{"exposed_ports": {"80": {"name": "fl-api-neg"}}}'
spec:
  selector:
    app: fl-server
  ports:
    - port: 80
      targetPort: 8081
      name: http
  type: ClusterIP
