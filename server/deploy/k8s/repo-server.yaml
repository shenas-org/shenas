apiVersion: apps/v1
kind: Deployment
metadata:
  name: repo-server
  namespace: shenas
  labels:
    app: repo-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: repo-server
  template:
    metadata:
      labels:
        app: repo-server
    spec:
      containers:
        - name: repo-server
          image: REGION-docker.pkg.dev/PROJECT_ID/shenas/repo-server:latest
          ports:
            - containerPort: 7290
              name: http
          env:
            - name: GCS_PACKAGES_BUCKET
              value: shenas-packages
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /simple/
              port: 7290
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /simple/
              port: 7290
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: repo-server
  namespace: shenas
spec:
  selector:
    app: repo-server
  ports:
    - port: 80
      targetPort: 7290
      name: http
  type: ClusterIP
