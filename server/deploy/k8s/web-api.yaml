apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-api
  namespace: shenas
  labels:
    app: web-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web-api
  template:
    metadata:
      labels:
        app: web-api
    spec:
      containers:
        - name: web-api
          image: REGION-docker.pkg.dev/PROJECT_ID/shenas/web-api:latest
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - secretRef:
                name: web-api-secrets
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: web-api
  namespace: shenas
spec:
  selector:
    app: web-api
  ports:
    - port: 80
      targetPort: 8000
      name: http
  type: ClusterIP
