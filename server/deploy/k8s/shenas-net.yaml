apiVersion: apps/v1
kind: Deployment
metadata:
  name: shenas-net
  namespace: shenas
  labels:
    app: shenas-net
spec:
  replicas: 1
  selector:
    matchLabels:
      app: shenas-net
  template:
    metadata:
      labels:
        app: shenas-net
    spec:
      containers:
        - name: shenas-net
          image: REGION-docker.pkg.dev/PROJECT_ID/shenas/shenas-net:latest
          ports:
            - containerPort: 80
              name: http
          envFrom:
            - secretRef:
                name: shenas-net-auth
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: shenas-net
  namespace: shenas
spec:
  selector:
    app: shenas-net
  ports:
    - port: 80
      targetPort: 80
      name: http
  type: ClusterIP
