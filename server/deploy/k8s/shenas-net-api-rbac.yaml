---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: shenas-net-api
  namespace: shenas

---
# Allow shenas-net-api to manage worker deployments and secrets
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: worker-manager
  namespace: shenas-workers
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "create", "delete"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "create", "delete"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: shenas-net-api-worker-manager
  namespace: shenas-workers
subjects:
  - kind: ServiceAccount
    name: shenas-net-api
    namespace: shenas
roleRef:
  kind: Role
  name: worker-manager
  apiGroup: rbac.authorization.k8s.io
