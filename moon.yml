$schema: 'https://moonrepo.dev/schemas/project.json'

tasks:
  lint:
    script: 'uv run --no-sync ruff check . && uv run --no-sync ruff format --check . && uv run --no-sync ty check cli/ repository/ app/'
    inputs:
      - '**/*.py'
  test:
    command: 'uv run --no-sync pytest'
    inputs:
      - '**/*.py'
    deps:
      - '~:lint'
