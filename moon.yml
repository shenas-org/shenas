$schema: 'https://moonrepo.dev/schemas/project.json'

tasks:
  clean:
    script: 'rm -rf dist/ build/_pyinstaller_work/ htmlcov/ .coverage coverage.json packages/'
    options:
      cache: false
  lint:
    script: 'uv run --no-sync ruff check . && uv run --no-sync ruff format --check . && uv run --no-sync ty check repository/ app/ --exclude "**/vendor/**"'
    inputs:
      - '**/*.py'
  test:
    command: 'uv run --no-sync pytest'
    inputs:
      - '**/*.py'
    deps:
      - '~:lint'
  coverage:
    script: >
      uv run --no-sync pytest --cov=repository --cov=app
      --cov=shenas_pipes --cov=shenas_schemas
      --cov-report=term-missing --cov-report=html:htmlcov --cov-report=json:coverage.json
    inputs:
      - '**/*.py'
  pyinstaller:
    command: 'uv run python build/pyinstaller_build.py'
    inputs:
      - 'build/**/*.py'
      - 'app/**/*.py'
      - 'scheduler/**/*.py'
      - 'repository/**/*.py'
      - 'plugins/**/*.py'
