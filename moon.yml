$schema: 'https://moonrepo.dev/schemas/project.json'
id: 'shenas'

tasks:
  clean:
    script: 'rm -rf dist/ build/_pyinstaller_work/ htmlcov/ .coverage coverage.json packages/'
    options:
      cache: false

  lint:
    script: |
      moon run :python-lint :python-format-check :python-type-check :js-lint :js-format-check :js-type-check
    options:
      cache: false

  test:
    script: |
      moon run :python-test :js-test
    options:
      cache: false
