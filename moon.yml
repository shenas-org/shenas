$schema: 'https://moonrepo.dev/schemas/project.json'

tasks:
  lint:
    script: 'uv run ruff check . && uv run ruff format --check . && uv run ty check cli/ repository/ app/'
    inputs:
      - '**/*.py'
  test:
    command: 'uv run --no-sync pytest'
    inputs:
      - '**/*.py'
    deps:
      - '~:lint'
  dev-install:
    command: 'make dev-install'
    options:
      cache: false
      runInCI: false
