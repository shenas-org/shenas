$schema: 'https://moonrepo.dev/schemas/project.json'

tasks:
  clean:
    script: 'rm -rf dist/ build/_pyinstaller_work/ htmlcov/ .coverage coverage.json packages/'
    options:
      cache: false
  lint:
    script: 'uv run --no-sync ruff check . && uv run --no-sync ruff format --check . && uv run --no-sync ty check repo-server/ app/ --exclude "**/vendor/**" --exclude "**/fl/**" --extra-search-path repo-server'
  # Run with: uv sync --group fl && moon run :lint-fl
  lint-fl:
    script: 'uv run --no-sync ty check app/fl/'
    inputs:
      - 'app/fl/**/*.py'
    inputs:
      - '**/*.py'
  test:
    command: 'uv run --no-sync pytest'
    inputs:
      - '**/*.py'
    deps:
      - '~:lint'
  coverage:
    script: >
      uv run --no-sync pytest --cov=repo_server --cov=app
      --cov=shenas_pipes --cov=shenas_schemas
      --cov-report=term-missing --cov-report=html:htmlcov --cov-report=json:coverage.json
    inputs:
      - '**/*.py'
  pyinstaller:
    command: 'uv run python build/pyinstaller_build.py'
    inputs:
      - 'build/**/*.py'
      - 'app/**/*.py'
      - 'scheduler/**/*.py'
      - 'repo-server/**/*.py'
      - 'plugins/**/*.py'
